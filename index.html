<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaCart | The Future of Tech</title>
    <style>
        :root {
            --bg: #050505;
            --surface: #121212;
            --text: #ffffff;
            --accent: #3b82f6;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --muted: #888888;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --transition: cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --text: #1d1d1f;
            --accent: #0066cc;
            --glass: rgba(0, 0, 0, 0.03);
            --border: rgba(0, 0, 0, 0.1);
            --muted: #6e6e73;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            overflow-x: hidden;
            transition: background 0.5s var(--transition);
        }

        /* --- Header & Nav --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            backdrop-filter: blur(20px);
            background: var(--glass);
            border-bottom: 1px solid var(--border);
        }

        nav {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .nav-actions {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .search-bar {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            color: var(--text);
            outline: none;
            width: 200px;
            transition: width 0.3s var(--transition);
        }

        .search-bar:focus {
            width: 300px;
            border-color: var(--accent);
        }

        .btn-icon {
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
            position: relative;
            font-size: 1.2rem;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--accent);
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: bold;
        }

        /* --- Hero Section --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 2rem;
            background: radial-gradient(circle at center, var(--glass) 0%, transparent 70%);
        }

        .hero h1 {
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 900;
            line-height: 0.9;
            margin-bottom: 1.5rem;
            letter-spacing: -4px;
        }

        .hero p {
            font-size: 1.25rem;
            color: var(--muted);
            max-width: 600px;
            margin-bottom: 2rem;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 2rem;
            animation: bounce 2s infinite;
        }

        /* --- Products Grid --- */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        .section-title {
            font-size: 2.5rem;
            margin-bottom: 3rem;
            font-weight: 700;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 1.5rem;
            transition: transform 0.4s var(--transition), border-color 0.4s;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
        }

        .visual-placeholder {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 16px;
            background: linear-gradient(45deg, #222, #444);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Decorative "Tech" Shapes */
        .visual-placeholder::after {
            content: '';
            width: 60%;
            height: 60%;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            position: absolute;
        }

        .product-info h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .product-info p {
            color: var(--muted);
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 1rem;
            height: 3.2rem;
            overflow: hidden;
        }

        .product-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .price {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .add-btn {
            background: var(--text);
            color: var(--bg);
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .add-btn:hover {
            opacity: 0.9;
        }

        /* --- Cart Drawer --- */
        .cart-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 2000;
            display: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .cart-drawer {
            position: fixed;
            right: -450px;
            top: 0;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: var(--surface);
            z-index: 2001;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            transition: right 0.4s var(--transition);
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }

        .cart-active .cart-overlay { display: block; opacity: 1; }
        .cart-active .cart-drawer { right: 0; }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 2rem;
        }

        .cart-item {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .cart-item-img {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            background: var(--glass);
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-qty-ctrl {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .qty-btn {
            background: var(--glass);
            border: 1px solid var(--border);
            color: var(--text);
            width: 24px;
            height: 24px;
            border-radius: 4px;
            cursor: pointer;
        }

        .cart-footer {
            border-top: 1px solid var(--border);
            padding-top: 2rem;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        .checkout-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 1.2rem;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }

        /* --- Animations --- */
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        /* --- Dark/Light Toggle Switch --- */
        .theme-toggle {
            width: 40px;
            height: 20px;
            background: var(--muted);
            border-radius: 20px;
            position: relative;
            cursor: pointer;
        }

        .theme-toggle::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: 0.3s;
        }

        [data-theme="light"] .theme-toggle::after {
            left: 22px;
        }

        /* --- Footer --- */
        footer {
            border-top: 1px solid var(--border);
            padding: 4rem 2rem;
            text-align: center;
            color: var(--muted);
        }

        .empty-cart-msg {
            text-align: center;
            margin-top: 50px;
            color: var(--muted);
        }

        @media (max-width: 768px) {
            .search-bar { display: none; }
            .hero h1 { font-size: 4rem; }
            .product-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="logo" onclick="window.scrollTo({top:0, behavior:'smooth'})">NovaCart</div>
            <div class="nav-actions">
                <input type="text" class="search-bar" placeholder="Search tech..." id="searchInput">
                <div class="theme-toggle" id="themeToggle"></div>
                <button class="btn-icon" id="cartBtn">
                    <span>Bag</span>
                    <span class="cart-count" id="cartCount">0</span>
                </button>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Engineered for <br> the Future.</h1>
            <p>Experience the next evolution of personal technology on the official NovaCart. Precision crafted, minimalist by design.</p>
            <div class="scroll-indicator">↓</div>
        </section>

        <div class="container" id="shop">
            <h2 class="section-title">Latest Drops</h2>
            <div class="product-grid" id="productGrid">
                <!-- Products injected by JS -->
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 NovaCart Industries. Designed for the modern NovaCart experience.</p>
    </footer>

    <!-- Cart Sidebar -->
    <div class="cart-overlay" id="cartOverlay"></div>
    <div class="cart-drawer" id="cartDrawer">
        <div class="cart-header">
            <h2>Your Bag</h2>
            <button class="btn-icon" id="closeCart">✕</button>
        </div>
        <div class="cart-items" id="cartItems">
            <!-- Items injected by JS -->
        </div>
        <div class="cart-footer">
            <div class="total-row">
                <span>Total</span>
                <span id="cartTotal">$0.00</span>
            </div>
            <button class="checkout-btn">Checkout</button>
        </div>
    </div>

    <script>
        // --- Product Data ---
        const products = [
            {
                id: 1,
                name: "Aura Pods Pro",
                price: 299,
                description: "Spatial audio redefined with active noise cancellation and 40-hour battery life.",
                color: "linear-gradient(135deg, #667eea 0%, #764ba2 100%)"
            },
            {
                id: 2,
                name: "Quantum Watch",
                price: 549,
                description: "Titanium casing with a holographic micro-LED display and health tracking sensors.",
                color: "linear-gradient(135deg, #2af598 0%, #009efd 100%)"
            },
            {
                id: 3,
                name: "Nova Hub",
                price: 189,
                description: "The central nervous system for your smart home. Minimalist aesthetics, maximum power.",
                color: "linear-gradient(135deg, #f093fb 0%, #f5576c 100%)"
            },
            {
                id: 4,
                name: "Flow Keyboard",
                price: 129,
                description: "Ultra-slim mechanical switches with dynamic RGB backlighting and zero-latency wireless.",
                color: "linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)"
            },
            {
                id: 5,
                name: "Vision Glass",
                price: 899,
                description: "Augmented reality packed into a lightweight frame. The ultimate NovaCart companion.",
                color: "linear-gradient(135deg, #fa709a 0%, #fee140 100%)"
            },
            {
                id: 6,
                name: "Pulse Charge",
                price: 79,
                description: "Magnetic wireless charging that delivers 30W of power instantly to your devices.",
                color: "linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)"
            }
        ];

        // --- State ---
        let cart = JSON.parse(localStorage.getItem('novacart_bag')) || [];

        // --- DOM Elements ---
        const productGrid = document.getElementById('productGrid');
        const cartItemsContainer = document.getElementById('cartItems');
        const cartCount = document.getElementById('cartCount');
        const cartTotal = document.getElementById('cartTotal');
        const cartBtn = document.getElementById('cartBtn');
        const closeCart = document.getElementById('closeCart');
        const cartOverlay = document.getElementById('cartOverlay');
        const searchInput = document.getElementById('searchInput');
        const themeToggle = document.getElementById('themeToggle');

        // --- Initialize ---
        function init() {
            renderProducts(products);
            updateCartUI();
        }

        // --- Render Functions ---
        function renderProducts(data) {
            productGrid.innerHTML = data.map(product => `
                <div class="product-card">
                    <div class="visual-placeholder" style="background: ${product.color}">
                        <div style="width:100px; height:100px; background: rgba(255,255,255,0.1); border-radius: 20px; backdrop-filter: blur(5px);"></div>
                    </div>
                    <div class="product-info">
                        <h3>${product.name}</h3>
                        <p>${product.description}</p>
                        <div class="product-meta">
                            <span class="price">$${product.price}</span>
                            <button class="add-btn" onclick="addToCart(${product.id})">Add to Bag</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateCartUI() {
            // Update counter
            const totalQty = cart.reduce((sum, item) => sum + item.quantity, 0);
            cartCount.textContent = totalQty;

            // Render items
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = `<p class="empty-cart-msg">Your NovaCart is empty.</p>`;
            } else {
                cartItemsContainer.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div class="cart-item-img" style="background: ${item.color}"></div>
                        <div class="cart-item-details">
                            <h4>${item.name}</h4>
                            <p>$${item.price}</p>
                            <div class="cart-qty-ctrl">
                                <button class="qty-btn" onclick="changeQty(${item.id}, -1)">-</button>
                                <span>${item.quantity}</span>
                                <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
                            </div>
                        </div>
                        <button class="btn-icon" onclick="removeFromCart(${item.id})">✕</button>
                    </div>
                `).join('');
            }

            // Update Total
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            cartTotal.textContent = `$${total.toFixed(2)}`;
            
            // Persist
            localStorage.setItem('novacart_bag', JSON.stringify(cart));
        }

        // --- Actions ---
        window.addToCart = (id) => {
            const product = products.find(p => p.id === id);
            const existing = cart.find(item => item.id === id);

            if (existing) {
                existing.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            updateCartUI();
            toggleCart(true);
        };

        window.removeFromCart = (id) => {
            cart = cart.filter(item => item.id !== id);
            updateCartUI();
        };

        window.changeQty = (id, delta) => {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) {
                    removeFromCart(id);
                } else {
                    updateCartUI();
                }
            }
        };

        function toggleCart(show) {
            if (show) {
                document.body.classList.add('cart-active');
            } else {
                document.body.classList.remove('cart-active');
            }
        }

        // --- Search Logic ---
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = products.filter(p => 
                p.name.toLowerCase().includes(term) || 
                p.description.toLowerCase().includes(term)
            );
            renderProducts(filtered);
            
            // Smooth scroll to results if not already viewing
            if(term.length > 0) {
                document.getElementById('shop').scrollIntoView({ behavior: 'smooth' });
            }
        });

        // --- Theme Toggle ---
        themeToggle.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', target);
        });

        // --- UI Listeners ---
        cartBtn.addEventListener('click', () => toggleCart(true));
        closeCart.addEventListener('click', () => toggleCart(false));
        cartOverlay.addEventListener('click', () => toggleCart(false));

        // Start NovaCart experience
        init();

    </script>
</body>
</html>
