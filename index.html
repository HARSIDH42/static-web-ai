<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaCart | Future of Tech</title>
    <style>
        :root {
            --accent: #6366f1;
            --accent-dark: #4f46e5;
            --bg: #030712;
            --surface: #111827;
            --text: #f9fafb;
            --text-muted: #9ca3af;
            --glass: rgba(17, 24, 39, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --font: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font);
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* Glassmorphism Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-actions {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .search-container {
            position: relative;
        }

        .search-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 0.6rem 1rem;
            border-radius: 99px;
            color: white;
            width: 240px;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            width: 300px;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.1);
        }

        .cart-trigger {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            position: relative;
            padding: 0.5rem;
        }

        .cart-count {
            position: absolute;
            top: -2px;
            right: -2px;
            background: var(--accent);
            font-size: 0.7rem;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* Hero NovaCart */
        .hero-NovaCart {
            padding: 180px 5% 100px;
            text-align: center;
            background: radial-gradient(circle at top center, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
        }

        .hero-NovaCart h1 {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            letter-spacing: -2px;
        }

        .hero-NovaCart p {
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto 2rem;
            font-size: 1.2rem;
        }

        /* Product Grid NovaCart */
        .grid-NovaCart {
            padding: 0 5% 100px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 1.5rem;
            transition: transform 0.3s ease, border-color 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent);
        }

        .product-visual {
            aspect-ratio: 1;
            background: linear-gradient(45deg, #1f2937, #111827);
            border-radius: 16px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* CSS Illustration placeholders */
        .gadget-shape {
            width: 60%;
            height: 60%;
            background: var(--accent);
            filter: blur(40px);
            opacity: 0.3;
            border-radius: 50%;
        }

        .gadget-icon {
            position: absolute;
            width: 80px;
            height: 80px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            transform: rotate(15deg);
        }

        .product-info h3 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }

        .product-info p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .product-footer {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .add-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .add-btn:hover {
            background: var(--accent-dark);
        }

        /* Cart Drawer NovaCart */
        .cart-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .cart-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .cart-drawer {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100%;
            background: var(--surface);
            z-index: 2001;
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }

        @media (max-width: 480px) {
            .cart-drawer { width: 100%; right: -100%; }
        }

        .cart-drawer.active {
            right: 0;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .close-cart {
            background: none;
            border: 1px solid var(--border);
            color: white;
            padding: 0.5rem;
            border-radius: 50%;
            cursor: pointer;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .cart-item-visual {
            width: 70px;
            height: 70px;
            background: var(--bg);
            border-radius: 12px;
        }

        .cart-item-details {
            flex: 1;
        }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .qty-btn {
            background: var(--border);
            border: none;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            cursor: pointer;
        }

        .cart-footer {
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        .checkout-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 1.2rem;
            border-radius: 16px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">NovaCart</a>
        <div class="nav-actions">
            <div class="search-container">
                <input type="text" class="search-input" id="searchNovaCart" placeholder="Search gadgets...">
            </div>
            <button class="cart-trigger" id="openCartNovaCart">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                <span class="cart-count" id="countNovaCart">0</span>
            </button>
        </div>
    </header>

    <main>
        <section class="hero-NovaCart">
            <h1>Tomorrow's Tech, <br>Delivered Today.</h1>
            <p>Experience the next evolution of smart living with NovaCart's curated collection of 2026 premium gadgets.</p>
        </section>

        <section class="grid-NovaCart" id="productsNovaCart">
            <!-- Products injected by JS -->
        </section>
    </main>

    <div class="cart-overlay" id="overlayNovaCart"></div>
    <aside class="cart-drawer" id="drawerNovaCart">
        <div class="cart-header">
            <h2>Your Bag</h2>
            <button class="close-cart" id="closeCartNovaCart">✕</button>
        </div>
        <div class="cart-items" id="cartItemsNovaCart">
            <!-- Cart items injected by JS -->
        </div>
        <div class="cart-footer">
            <div class="total-row">
                <span>Total</span>
                <span id="totalNovaCart">$0.00</span>
            </div>
            <button class="checkout-btn">Secure Checkout</button>
        </div>
    </aside>

    <script>
        const products = [
            { id: 1, name: "NovaLink Hub", price: 299, desc: "Neural-link smart home controller.", color: "#6366f1" },
            { id: 2, name: "AeroPod Pro 3", price: 199, desc: "Spatial audio redefined.", color: "#10b981" },
            { id: 3, name: "Zenith Watch", price: 450, desc: "Titanium build with holographic UI.", color: "#f59e0b" },
            { id: 4, name: "Glow Keyboard", price: 150, desc: "Optical magnetic switches.", color: "#ec4899" },
            { id: 5, name: "Vision Goggles", price: 899, desc: "Lightweight AR for professionals.", color: "#8b5cf6" },
            { id: 6, name: "Pulse Mouse", price: 120, desc: "Zero-friction gaming sensor.", color: "#3b82f6" },
            { id: 7, name: "Cortex Drive", price: 80, desc: "10TB encrypted biometric storage.", color: "#ef4444" },
            { id: 8, name: "Flux Charger", price: 65, desc: "300W wireless rapid charging.", color: "#06b6d4" }
        ];

        let cart = JSON.parse(localStorage.getItem('novaCart_storage')) || [];

        // DOM Elements
        const productsGrid = document.getElementById('productsNovaCart');
        const searchInput = document.getElementById('searchNovaCart');
        const cartDrawer = document.getElementById('drawerNovaCart');
        const cartOverlay = document.getElementById('overlayNovaCart');
        const openCartBtn = document.getElementById('openCartNovaCart');
        const closeCartBtn = document.getElementById('closeCartNovaCart');
        const cartItemsContainer = document.getElementById('cartItemsNovaCart');
        const cartCountBadge = document.getElementById('countNovaCart');
        const cartTotalDisplay = document.getElementById('totalNovaCart');

        // Initialize NovaCart
        function initNovaCart() {
            renderProducts(products);
            updateCartUI();
        }

        // Render Product Cards
        function renderProducts(items) {
            productsGrid.innerHTML = items.map(product => `
                <article class="product-card">
                    <div class="product-visual">
                        <div class="gadget-shape" style="background: ${product.color}"></div>
                        <div class="gadget-icon"></div>
                    </div>
                    <div class="product-info">
                        <h3>${product.name}</h3>
                        <p>${product.desc}</p>
                    </div>
                    <div class="product-footer">
                        <span class="price">$${product.price}</span>
                        <button class="add-btn" onclick="addToBag(${product.id})">Add to Bag</button>
                    </div>
                </article>
            `).join('');
        }

        // Live Search NovaCart Functionality
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = products.filter(p => 
                p.name.toLowerCase().includes(term) || 
                p.desc.toLowerCase().includes(term)
            );
            renderProducts(filtered);
        });

        // Cart Logic
        window.addToBag = (id) => {
            const product = products.find(p => p.id === id);
            const existing = cart.find(item => item.id === id);

            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            saveAndUpdate();
            toggleCart(true);
        };

        function removeFromBag(id) {
            cart = cart.filter(item => item.id !== id);
            saveAndUpdate();
        }

        function changeQty(id, delta) {
            const item = cart.find(item => item.id === id);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) removeFromBag(id);
                else saveAndUpdate();
            }
        }

        function saveAndUpdate() {
            localStorage.setItem('novaCart_storage', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            // Update Badge
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            cartCountBadge.textContent = totalItems;

            // Update Items
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = `<p style="text-align:center; color:var(--text-muted); margin-top:2rem;">Your bag is empty.</p>`;
            } else {
                cartItemsContainer.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div class="cart-item-visual" style="background: linear-gradient(45deg, ${item.color}33, transparent)"></div>
                        <div class="cart-item-details">
                            <div style="display:flex; justify-content:space-between;">
                                <strong>${item.name}</strong>
                                <span>$${item.price * item.quantity}</span>
                            </div>
                            <div class="qty-controls">
                                <button class="qty-btn" onclick="changeQty(${item.id}, -1)">-</button>
                                <span>${item.quantity}</span>
                                <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
                                <button onclick="removeFromBag(${item.id})" style="background:none; border:none; color:#ef4444; font-size:0.8rem; cursor:pointer; margin-left:auto;">Remove</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            // Update Total
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            cartTotalDisplay.textContent = `$${total.toLocaleString()}`;
        }

        // UI Toggles
        function toggleCart(isOpen) {
            if (isOpen) {
                cartDrawer.classList.add('active');
                cartOverlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            } else {
                cartDrawer.classList.remove('active');
                cartOverlay.classList.remove('active');
                document.body.style.overflow = '';
            }
        }

        openCartBtn.addEventListener('click', () => toggleCart(true));
        closeCartBtn.addEventListener('click', () => toggleCart(false));
        cartOverlay.addEventListener('click', () => toggleCart(false));

        // Start NovaCart
        initNovaCart();

    </script>
</body>
</html>
