<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NovaCart offers premium smart gadgets. Explore our exclusive collection of high-tech apparel and accessories.">
    <title>NovaCart | Premium Smart Gadgets</title>
    <style>
        :root { --bg: #000; --text: #fff; --accent: #0071e3; --glass: rgba(255,255,255,0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; line-height: 1.6; }
        
        header { position: sticky; top: 0; padding: 20px 5%; backdrop-filter: blur(20px); background: rgba(0,0,0,0.8); display: flex; justify-content: space-between; align-items: center; z-index: 1000; border-bottom: 1px solid #333; }
        
        .hero { height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 20px; }
        .hero h1 { font-size: 3rem; margin-bottom: 10px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; padding: 40px 5%; max-width: 1400px; margin: auto; }
        .card { background: #111; border-radius: 20px; padding: 20px; transition: transform 0.2s; border: 1px solid #222; }
        .card:hover { transform: translateY(-5px); border-color: #444; }
        .card img { width: 100%; height: 250px; object-fit: cover; border-radius: 12px; margin-bottom: 15px; background: #222; }
        
        button { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 25px; cursor: pointer; font-weight: 600; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        
        #cart-drawer { position: fixed; right: -400px; top: 0; width: 350px; height: 100%; background: #111; padding: 25px; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 2000; box-shadow: -10px 0 30px rgba(0,0,0,0.5); overflow-y: auto; }
        .cart-open { right: 0 !important; }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #333; }
        
        .chat-btn { position: fixed; bottom: 30px; right: 30px; background: var(--accent); padding: 15px; border-radius: 50%; cursor: pointer; box-shadow: 0 4px 12px rgba(0,113,227,0.3); z-index: 1000; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } #cart-drawer { width: 100%; } }
    </style>
</head>
<body>

<header>
    <h1>NovaCart</h1>
    <nav>
        <button aria-label="Open Cart" onclick="toggleCart()">Bag (<span id="cart-count">0</span>)</button>
    </nav>
</header>

<section class="hero">
    <h1>Future of Tech</h1>
    <p>Premium gadgets designed for the next generation.</p>
</section>

<main class="grid" id="product-grid"></main>

<aside id="cart-drawer" aria-hidden="true">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>Your Bag</h2>
        <button onclick="toggleCart()">✕</button>
    </div>
    <div id="cart-items" style="margin: 20px 0;"></div>
    <div id="cart-total" style="font-weight: bold;"></div>
</aside>

<div class="chat-btn" onclick="initChat()" role="button" aria-label="Chat with Support">💬</div>

<script>
    const products = [
        { id: 1, name: 'Premium Watch', price: 29999, img: 'https://via.placeholder.com/300?text=Watch' },
        { id: 2, name: 'Tech Jacket', price: 8999, img: 'https://via.placeholder.com/300?text=Jacket' },
        { id: 3, name: 'Smart Shoe', price: 12500, img: 'https://via.placeholder.com/300?text=Shoe' }
    ];

    let cart = [];

    function renderProducts() {
        const grid = document.getElementById('product-grid');
        grid.innerHTML = products.map(p => `
            <article class="card">
                <img src="${p.img}" alt="${p.name}" loading="lazy">
                <h3>${p.name}</h3>
                <p>₹${p.price.toLocaleString()}</p>
                <button onclick="addToCart(${p.id})">Add to Bag</button>
            </article>
        `).join('');
    }

    function addToCart(id) {
        const item = products.find(p => p.id === id);
        cart.push(item);
        document.getElementById('cart-count').innerText = cart.length;
        updateCartDrawer();
    }

    function updateCartDrawer() {
        const list = document.getElementById('cart-items');
        const total = cart.reduce((sum, item) => sum + item.price, 0);
        list.innerHTML = cart.map(item => `
            <div class="cart-item">
                <span>${item.name}</span>
                <span>₹${item.price.toLocaleString()}</span>
            </div>
        `).join('');
        document.getElementById('cart-total').innerHTML = `Total: ₹${total.toLocaleString()}`;
    }

    function toggleCart() {
        const drawer = document.getElementById('cart-drawer');
        drawer.classList.toggle('cart-open');
        drawer.setAttribute('aria-hidden', drawer.classList.contains('cart-open') ? 'false' : 'true');
    }

    function initChat() {
        alert("Chatbot: Hello! How can I assist you with your order today?");
    }

    document.addEventListener('DOMContentLoaded', renderProducts);
</script>
</body>
</html>
