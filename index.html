<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaCart | Premium Tech Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --accent: #0071e3;
            --glass: rgba(255, 255, 255, 0.7);
            --border: rgba(0, 0, 0, 0.1);
            --card-bg: #f5f5f7;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg: #000000;
            --text: #ffffff;
            --accent: #2997ff;
            --glass: rgba(0, 0, 0, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --card-bg: #1d1d1f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            transition: var(--transition);
            overflow-x: hidden;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        /* Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            z-index: 1000;
            backdrop-filter: blur(20px);
            background: var(--glass);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            text-decoration: none;
            color: var(--text);
        }

        .nav-actions {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .search-bar {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 20px;
            color: var(--text);
            outline: none;
            width: 200px;
            transition: width 0.3s;
        }

        .search-bar:focus { width: 300px; }

        .btn-icon {
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
            font-size: 1.2rem;
            position: relative;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--accent);
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 10px;
        }

        /* Hero NovaCart */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 10%;
            background: radial-gradient(circle at center, var(--card-bg) 0%, var(--bg) 100%);
        }

        .hero h1 {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 20px;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s forwards;
        }

        .hero p {
            font-size: 1.5rem;
            color: #86868b;
            max-width: 600px;
            margin-bottom: 40px;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s 0.2s forwards;
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Products NovaCart */
        .section-title {
            padding: 80px 5% 40px;
            font-size: 2.5rem;
            font-weight: 600;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            padding: 0 5% 80px;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            border: 1px solid transparent;
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .product-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 20px;
        }

        .product-info h3 { font-size: 1.5rem; margin-bottom: 8px; }
        .product-info p { color: #86868b; font-size: 0.9rem; margin-bottom: 15px; line-height: 1.4; }
        .product-price { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; display: block; }

        .btn-add {
            width: 100%;
            padding: 15px;
            border-radius: 30px;
            border: none;
            background: var(--text);
            color: var(--bg);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-add:hover { opacity: 0.8; transform: scale(0.98); }

        /* Cart Drawer */
        .cart-overlay {
            position: fixed;
            top: 0;
            right: -100%;
            width: 400px;
            height: 100vh;
            background: var(--bg);
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
            z-index: 2000;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
        }

        .cart-overlay.active { right: 0; }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .cart-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 10px; }

        .cart-item-info { flex: 1; }
        .cart-item-qty {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .qty-btn {
            background: var(--card-bg);
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            color: var(--text);
        }

        .cart-footer {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid var(--border);
        }

        /* AI Chat NovaCart */
        .ai-chat-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            z-index: 1500;
            font-size: 1.5rem;
        }

        .chat-window {
            position: fixed;
            bottom: 100px;
            right: 30px;
            width: 350px;
            height: 500px;
            background: var(--bg);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            z-index: 1501;
            display: none;
            flex-direction: column;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .chat-header {
            background: var(--accent);
            color: white;
            padding: 20px;
            font-weight: 600;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 80%;
            font-size: 0.9rem;
        }

        .msg.bot { background: var(--card-bg); align-self: flex-start; }
        .msg.user { background: var(--accent); color: white; align-self: flex-end; }

        .chat-input-area {
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid var(--border);
        }

        .chat-input {
            flex: 1;
            border: 1px solid var(--border);
            padding: 8px 15px;
            border-radius: 20px;
            background: var(--card-bg);
            color: var(--text);
            outline: none;
        }

        /* Responsive NovaCart */
        @media (max-width: 768px) {
            .cart-overlay { width: 100%; }
            .search-bar { display: none; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">NovaCart</a>
        <div class="nav-actions">
            <input type="text" class="search-bar" placeholder="Search gadgets..." id="searchInput">
            <button class="btn-icon" id="themeToggle">🌓</button>
            <button class="btn-icon" id="cartBtn">
                🛒
                <span class="cart-count" id="cartCount">0</span>
            </button>
        </div>
    </header>

    <main id="mainContent">
        <section class="hero">
            <h1>Next-Gen Store.<br>NovaCart 2026.</h1>
            <p>Experience the intersection of high-performance tech and minimalist design. Your future starts here.</p>
            <button class="btn-add" style="width: 200px;" onclick="document.getElementById('shop').scrollIntoView()">Shop the Collection</button>
        </section>

        <h2 class="section-title" id="shop">Featured Technology</h2>
        <div class="grid" id="productGrid">
            <!-- Products injected by JS -->
        </div>
    </main>

    <!-- Cart Drawer -->
    <div class="cart-overlay" id="cartDrawer">
        <div class="cart-header">
            <h2>Your Bag</h2>
            <button class="btn-icon" id="closeCart">✕</button>
        </div>
        <div class="cart-items" id="cartItemsContainer">
            <!-- Cart items injected by JS -->
        </div>
        <div class="cart-footer">
            <div style="display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: 600; margin-bottom: 20px;">
                <span>Total</span>
                <span id="cartTotal">$0.00</span>
            </div>
            <button class="btn-add">Checkout</button>
        </div>
    </div>

    <!-- AI Assistant -->
    <button class="ai-chat-btn" id="aiToggle">🤖</button>
    <div class="chat-window" id="chatWindow">
        <div class="chat-header">NovaCart AI Assistant</div>
        <div class="chat-messages" id="chatMsgs">
            <div class="msg bot">Hello! I'm NovaCart AI. How can I help you discover our premium gadgets today?</div>
        </div>
        <div class="chat-input-area">
            <input type="text" class="chat-input" id="chatInput" placeholder="Ask anything...">
            <button class="btn-icon" id="sendChat">➤</button>
        </div>
    </div>

    <script>
        // Product Data
        const products = [
            { id: 1, name: "Nova Watch Series X", price: 499, img: "watch-1.jpg", desc: "Titanium casing with neural haptic feedback and 72-hour battery life." },
            { id: 2, name: "Aura Pods Pro", price: 249, img: "4.jpg", desc: "Spatial audio with dynamic transparency and nano-fiber acoustics." },
            { id: 3, name: "Stealth Runner 01", price: 180, img: "shoe-1.jpg", desc: "3D printed sole architecture for maximum energy return." },
            { id: 4, name: "Chrono Classic", price: 599, img: "watch-3.jpg", desc: "Swiss movement meets NovaCart digital integration." },
            { id: 5, name: "Neuro Ring", price: 299, img: "jewellery-1.jpg", desc: "Biometric monitoring in a 24k gold plated smart ring." },
            { id: 6, name: "Tech Parka V2", price: 350, img: "jacket-1.jpg", desc: "Graphene-infused fabric for intelligent temperature regulation." },
            { id: 7, name: "Pulse Sport Band", price: 120, img: "sports-1.jpg", desc: "Unbreakable silicone with integrated hydration sensors." },
            { id: 8, name: "Nova Vision Lenses", price: 899, img: "jewellery-2.jpg", desc: "Augmented reality interface built into premium eyewear." },
            { id: 9, name: "Core Essence Fragrance", price: 95, img: "perfume.jpg", desc: "Smart-scent technology that adapts to your body chemistry." },
            { id: 10, name: "Nano Clean Solution", price: 45, img: "shampoo.jpg", desc: "Molecular level cleaning for all your premium hardware." },
            { id: 11, name: "Phantom Sneakers", price: 220, img: "shoe-4.jpg", desc: "Liquid-knit upper with adaptive lacing system." },
            { id: 12, name: "Vector Sports Jacket", price: 275, img: "jacket-4.jpg", desc: "High-visibility smart fibers for night-time safety." }
        ];

        let cart = JSON.parse(localStorage.getItem('novacart_cart')) || [];

        // Initialize NovaCart
        function init() {
            renderProducts(products);
            updateCartUI();
            setupEventListeners();
        }

        // Render Products
        function renderProducts(items) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = items.map(p => `
                <div class="product-card">
                    <img src="images/${p.img}" class="product-image" alt="${p.name}">
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <p>${p.desc}</p>
                        <span class="product-price">$${p.price}</span>
                        <button class="btn-add" onclick="addToCart(${p.id})">Add to Bag</button>
                    </div>
                </div>
            `).join('');
        }

        // Cart Logic
        window.addToCart = (id) => {
            const product = products.find(p => p.id === id);
            const exists = cart.find(item => item.id === id);
            if (exists) {
                exists.qty++;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            saveCart();
            openCart();
        };

        function saveCart() {
            localStorage.setItem('novacart_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cartItemsContainer');
            const count = document.getElementById('cartCount');
            const total = document.getElementById('cartTotal');
            
            count.innerText = cart.reduce((acc, item) => acc + item.qty, 0);
            
            if (cart.length === 0) {
                container.innerHTML = `<p style="text-align:center; margin-top:50px; color:#86868b;">Your bag is empty.</p>`;
                total.innerText = `$0.00`;
                return;
            }

            container.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <img src="images/${item.img}" alt="${item.name}">
                    <div class="cart-item-info">
                        <h4>${item.name}</h4>
                        <p>$${item.price}</p>
                        <div class="cart-item-qty">
                            <button class="qty-btn" onclick="updateQty(${item.id}, -1)">-</button>
                            <span>${item.qty}</span>
                            <button class="qty-btn" onclick="updateQty(${item.id}, 1)">+</button>
                        </div>
                    </div>
                    <button class="btn-icon" onclick="removeFromCart(${item.id})">✕</button>
                </div>
            `).join('');

            const sum = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);
            total.innerText = `$${sum.toFixed(2)}`;
        }

        window.updateQty = (id, delta) => {
            const item = cart.find(i => i.id === id);
            item.qty += delta;
            if (item.qty < 1) return removeFromCart(id);
            saveCart();
        };

        window.removeFromCart = (id) => {
            cart = cart.filter(i => i.id !== id);
            saveCart();
        };

        // UI Helpers
        function openCart() { document.getElementById('cartDrawer').classList.add('active'); }
        function closeCart() { document.getElementById('cartDrawer').classList.remove('active'); }

        function setupEventListeners() {
            document.getElementById('cartBtn').onclick = openCart;
            document.getElementById('closeCart').onclick = closeCart;
            
            // Theme Toggle
            document.getElementById('themeToggle').onclick = () => {
                const current = document.body.getAttribute('data-theme');
                const next = current === 'dark' ? 'light' : 'dark';
                document.body.setAttribute('data-theme', next);
                localStorage.setItem('novacart_theme', next);
            };

            // Restore Theme
            const savedTheme = localStorage.getItem('novacart_theme') || 'light';
            document.body.setAttribute('data-theme', savedTheme);

            // Search
            document.getElementById('searchInput').oninput = (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = products.filter(p => 
                    p.name.toLowerCase().includes(term) || 
                    p.desc.toLowerCase().includes(term)
                );
                renderProducts(filtered);
            };

            // AI Chat Toggle
            document.getElementById('aiToggle').onclick = () => {
                const win = document.getElementById('chatWindow');
                win.style.display = win.style.display === 'flex' ? 'none' : 'flex';
            };

            // AI Logic
            const chatInput = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendChat');
            
            const handleChat = async () => {
                const text = chatInput.value.trim();
                if (!text) return;

                appendMsg(text, 'user');
                chatInput.value = '';

                // Simulate Gemini API Call
                appendMsg("Thinking...", 'bot', 'thinking');
                
                setTimeout(() => {
                    const thinking = document.getElementById('thinking');
                    if (thinking) thinking.remove();
                    
                    let response = "I'm the NovaCart AI. I can help you find smart watches, futuristic footwear, and premium tech jackets. Are you looking for something specific?";
                    
                    if (text.toLowerCase().includes('watch')) response = "Our Nova Watch Series X is our best-seller. It features titanium construction and neural haptics.";
                    if (text.toLowerCase().includes('price')) response = "Our products range from $45 for accessories to $899 for Nova Vision lenses.";
                    
                    appendMsg(response, 'bot');
                }, 1000);
            };

            sendBtn.onclick = handleChat;
            chatInput.onkeypress = (e) => { if (e.key === 'Enter') handleChat(); };
        }

        function appendMsg(text, type, id = '') {
            const container = document.getElementById('chatMsgs');
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            if (id) div.id = id;
            div.innerText = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // Real Gemini Integration (Requires API Key)
        /*
        async function askGemini(prompt) {
            const API_KEY = "YOUR_GEMINI_API_KEY";
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await res.json();
            return data.candidates[0].content.parts[0].text;
        }
        */

        init();
    </script>
</body>
</html>
