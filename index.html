<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaCart | Premium Smart Gadgets</title>
    <style>
        :root {
            --primary: #007AFF;
            --bg: #050505;
            --surface: #121212;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-dim: #a1a1a1;
            --accent-gradient: linear-gradient(135deg, #007AFF 0%, #00C6FF 100%);
            --card-radius: 24px;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Glassmorphism Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 1.2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .search-container {
            position: relative;
        }

        #searchBar {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            color: white;
            width: 250px;
            transition: var(--transition);
        }

        #searchBar:focus {
            outline: none;
            width: 300px;
            border-color: var(--primary);
        }

        .cart-trigger {
            position: relative;
            cursor: pointer;
            padding: 8px;
        }

        .cart-count {
            position: absolute;
            top: -2px;
            right: -2px;
            background: var(--primary);
            font-size: 0.7rem;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* Hero Section */
        .hero {
            padding: 180px 5% 100px;
            text-align: center;
            background: radial-gradient(circle at top center, rgba(0, 122, 255, 0.15) 0%, transparent 70%);
        }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            line-height: 1.1;
            margin-bottom: 1.5rem;
            font-weight: 900;
            letter-spacing: -3px;
        }

        .hero p {
            color: var(--text-dim);
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto 2rem;
        }

        /* Product Grid */
        .container {
            padding: 0 5% 100px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2.5rem;
        }

        .product-card {
            background: var(--surface);
            border-radius: var(--card-radius);
            padding: 1.5rem;
            border: 1px solid var(--border);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .product-visual {
            width: 100%;
            height: 250px;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            background: linear-gradient(45deg, #1a1a1a, #2a2a2a);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-visual::after {
            content: '';
            width: 60%;
            height: 60%;
            background: var(--accent-gradient);
            filter: blur(40px);
            opacity: 0.3;
            border-radius: 50%;
        }

        .abstract-shape {
            width: 100px;
            height: 100px;
            border: 2px solid rgba(255,255,255,0.1);
            position: absolute;
            transform: rotate(45deg);
        }

        .product-info h3 {
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
        }

        .product-desc {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            height: 3.6em;
            overflow: hidden;
        }

        .product-footer {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .add-btn {
            background: var(--text);
            color: var(--bg);
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .add-btn:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.05);
        }

        /* Cart Drawer */
        .cart-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: var(--transition);
        }

        .cart-drawer {
            position: fixed;
            right: -100%;
            top: 0;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: var(--surface);
            z-index: 2001;
            transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 2rem;
            display: flex;
            flex-direction: column;
        }

        .cart-open .cart-overlay {
            visibility: visible;
            opacity: 1;
        }

        .cart-open .cart-drawer {
            right: 0;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .close-cart {
            cursor: pointer;
            font-size: 1.5rem;
        }

        .cart-items {
            flex-grow: 1;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            gap: 1rem;
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--border);
        }

        .cart-item-visual {
            width: 80px;
            height: 80px;
            background: var(--glass);
            border-radius: 12px;
            flex-shrink: 0;
        }

        .cart-item-details {
            flex-grow: 1;
        }

        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .qty-btn {
            background: var(--glass);
            border: 1px solid var(--border);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
        }

        .cart-footer {
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        .checkout-btn {
            width: 100%;
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: 1.2rem;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
        }

        /* Utility */
        .empty-cart-msg {
            text-align: center;
            color: var(--text-dim);
            margin-top: 3rem;
        }

        @media (max-width: 768px) {
            .nav-actions #searchBar { width: 150px; }
            .nav-actions #searchBar:focus { width: 180px; }
            .hero h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="location.reload()">NovaCart</div>
        <div class="nav-actions">
            <div class="search-container">
                <input type="text" id="searchBar" placeholder="Search NovaCart gadgets...">
            </div>
            <div class="cart-trigger" onclick="toggleCart(true)">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
    </header>

    <section class="hero">
        <h1>The Future of <br>Modern Tech</h1>
        <p>Experience the next evolution of smart living with the NovaCart premium collection of 2026-ready accessories.</p>
    </section>

    <main class="container">
        <div class="grid" id="productGrid">
            <!-- Products injected by JS -->
        </div>
    </main>

    <div class="cart-overlay" onclick="toggleCart(false)"></div>
    <div class="cart-drawer" id="cartDrawer">
        <div class="cart-header">
            <h2>Your Bag</h2>
            <div class="close-cart" onclick="toggleCart(false)">&times;</div>
        </div>
        <div class="cart-items" id="cartItems">
            <!-- Cart items injected by JS -->
        </div>
        <div class="cart-footer">
            <div class="total-row">
                <span>Total</span>
                <span id="cartTotal">$0.00</span>
            </div>
            <button class="checkout-btn">Secure Checkout</button>
        </div>
    </div>

    <script>
        // Data: NovaCart Product Collection
        const products = [
            {
                id: 1,
                name: "NovaBeam Pro",
                price: 299,
                description: "Holographic spatial audio projector with adaptive ambient lighting for your entire NovaCart setup.",
                color: "linear-gradient(135deg, #FF3B30, #FF9500)"
            },
            {
                id: 2,
                name: "Core Hub Z",
                price: 149,
                description: "Minimalist 12-in-1 neural docking station featuring blazing fast 80Gbps transfer speeds.",
                color: "linear-gradient(135deg, #5856D6, #AF52DE)"
            },
            {
                id: 3,
                name: "Aero Buds Max",
                price: 399,
                description: "Carbon-fiber wireless audio drivers with 100-hour battery and zero-latency bio-sync.",
                color: "linear-gradient(135deg, #34C759, #00C7BE)"
            },
            {
                id: 4,
                name: "Titan Watch Ultra",
                price: 599,
                description: "Crafted from liquid metal, this NovaCart exclusive wearable monitors 50+ bio-metrics in real-time.",
                color: "linear-gradient(135deg, #007AFF, #5AC8FA)"
            },
            {
                id: 5,
                name: "Ghost Keyboard",
                price: 189,
                description: "Transparent mechanical switches with magnetic levitation stabilizers for the ultimate typing feel.",
                color: "linear-gradient(135deg, #8E8E93, #636366)"
            },
            {
                id: 6,
                name: "Zenith Mouse",
                price: 129,
                description: "Ergonomic masterpiece with an integrated OLED display for real-time DPI and NovaCart notifications.",
                color: "linear-gradient(135deg, #FF2D55, #FF375F)"
            }
        ];

        let cart = JSON.parse(localStorage.getItem('novacart_cart')) || [];

        // Initialize NovaCart
        function initNovaCart() {
            renderProducts(products);
            updateCartUI();
            setupSearch();
        }

        // Render Products to Grid
        function renderProducts(items) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = items.map(product => `
                <div class="product-card">
                    <div class="product-visual">
                        <div class="abstract-shape" style="border-color: ${product.color}"></div>
                        <div class="abstract-shape" style="transform: rotate(15deg); border-color: ${product.color}; opacity: 0.5"></div>
                    </div>
                    <div class="product-info">
                        <h3>${product.name}</h3>
                        <p class="product-desc">${product.description}</p>
                        <div class="product-footer">
                            <span class="price">$${product.price}</span>
                            <button class="add-btn" onclick="addToCart(${product.id})">Add to Bag</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Search Functionality
        function setupSearch() {
            const searchBar = document.getElementById('searchBar');
            searchBar.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                const filtered = products.filter(p => 
                    p.name.toLowerCase().includes(query) || 
                    p.description.toLowerCase().includes(query)
                );
                renderProducts(filtered);
            });
        }

        // Cart Logic
        function toggleCart(show) {
            document.body.classList.toggle('cart-open', show);
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existing = cart.find(item => item.id === productId);

            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }

            saveAndUpdate();
            toggleCart(true);
        }

        function updateQuantity(id, delta) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.quantity += delta;
                if (item.quantity < 1) {
                    cart = cart.filter(i => i.id !== id);
                }
                saveAndUpdate();
            }
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.id !== id);
            saveAndUpdate();
        }

        function saveAndUpdate() {
            localStorage.setItem('novacart_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            const cartItems = document.getElementById('cartItems');
            const cartCount = document.getElementById('cartCount');
            const cartTotal = document.getElementById('cartTotal');
            
            // Update counter
            const totalItems = cart.reduce((acc, item) => acc + item.quantity, 0);
            cartCount.textContent = totalItems;

            // Render items
            if (cart.length === 0) {
                cartItems.innerHTML = `<p class="empty-cart-msg">Your NovaCart is currently empty.</p>`;
            } else {
                cartItems.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div class="cart-item-visual" style="background: ${item.color}; opacity: 0.2"></div>
                        <div class="cart-item-details">
                            <h4>${item.name}</h4>
                            <p style="color: var(--text-dim); font-size: 0.8rem">$${item.price}</p>
                            <div class="cart-item-controls">
                                <button class="qty-btn" onclick="updateQuantity(${item.id}, -1)">-</button>
                                <span>${item.quantity}</span>
                                <button class="qty-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                                <span style="margin-left: auto; color: var(--primary); cursor: pointer; font-size: 0.8rem" onclick="removeFromCart(${item.id})">Remove</span>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            // Update Total
            const total = cart.reduce((acc, item) => acc + (item.price * item.quantity), 0);
            cartTotal.textContent = `$${total.toLocaleString()}`;
        }

        // Initialize NovaCart on load
        document.addEventListener('DOMContentLoaded', initNovaCart);
    </script>
</body>
</html>
