<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaCart | The Future of Tech Accessories</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #000000;
            --bg-secondary: #111111;
            --text-primary: #ffffff;
            --text-secondary: #a1a1a6;
            --accent: #0071e3;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        [data-theme="light"] {
            --bg-primary: #f5f5f7;
            --bg-secondary: #ffffff;
            --text-primary: #1d1d1f;
            --text-secondary: #6e6e73;
            --accent: #0071e3;
            --glass: rgba(0, 0, 0, 0.05);
            --glass-border: rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            transition: background-color 0.5s ease;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--text-secondary); border-radius: 10px; }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            z-index: 1000;
            backdrop-filter: blur(20px);
            background: var(--glass);
            border-bottom: 1px solid var(--glass-border);
        }

        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -1px;
            cursor: pointer;
        }

        .nav-actions {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .nav-icon {
            cursor: pointer;
            position: relative;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.2rem;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -10px;
            background: var(--accent);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 50%;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            position: relative;
            overflow: hidden;
        }

        .hero h1 {
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 800;
            line-height: 0.9;
            margin-bottom: 20px;
            background: linear-gradient(180deg, var(--text-primary) 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            transform: translateY(50px);
            animation: fadeUp 1.2s forwards 0.2s;
        }

        .hero p {
            font-size: 1.5rem;
            color: var(--text-secondary);
            max-width: 600px;
            opacity: 0;
            animation: fadeUp 1.2s forwards 0.4s;
        }

        .hero-img {
            position: absolute;
            bottom: -100px;
            width: 80%;
            max-width: 1200px;
            z-index: -1;
            opacity: 0.4;
            mask-image: linear-gradient(to top, transparent 10%, black 100%);
        }

        /* Search Bar */
        .search-container {
            width: 100%;
            max-width: 600px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .search-input {
            width: 100%;
            padding: 15px 25px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }

        .search-input:focus {
            background: var(--bg-secondary);
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0, 113, 227, 0.2);
        }

        /* Product Grid */
        .section-title {
            padding: 100px 5% 40px;
            font-size: 3rem;
            text-align: left;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            padding: 0 5% 100px;
        }

        .product-card {
            background: var(--bg-secondary);
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            transition: var(--transition);
            border: 1px solid var(--glass-border);
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .product-img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            transition: var(--transition);
        }

        .product-card:hover .product-img {
            transform: scale(1.05);
        }

        .product-info {
            padding: 25px;
            background: linear-gradient(to top, var(--bg-secondary) 80%, transparent);
        }

        .product-category {
            color: var(--accent);
            text-transform: uppercase;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .product-name {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .product-desc {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .add-btn {
            background: var(--text-primary);
            color: var(--bg-primary);
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .add-btn:hover {
            transform: scale(1.05);
            background: var(--accent);
            color: white;
        }

        /* Cart Drawer */
        #cart-drawer {
            position: fixed;
            top: 0;
            right: -450px;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: var(--bg-secondary);
            z-index: 2000;
            transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 40px;
            box-shadow: -20px 0 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        #cart-drawer.active {
            right: 0;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .cart-items {
            flex-grow: 1;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            padding-bottom: 25px;
            border-bottom: 1px solid var(--glass-border);
        }

        .cart-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 12px;
        }

        .cart-item-info h4 { margin-bottom: 5px; }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
        }

        .qty-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            width: 25px;
            height: 25px;
            border-radius: 50%;
            cursor: pointer;
        }

        .cart-footer {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid var(--glass-border);
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .checkout-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }

        /* Chatbot */
        #chat-widget {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }

        #chat-trigger {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,113,227,0.3);
            font-size: 1.5rem;
        }

        #chat-window {
            position: absolute;
            bottom: 80px;
            right: 0;
            width: 350px;
            height: 500px;
            background: var(--bg-secondary);
            border-radius: 20px;
            display: none;
            flex-direction: column;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        #chat-window.active { display: flex; }

        .chat-header {
            padding: 20px;
            background: var(--accent);
            color: white;
        }

        .chat-messages {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 80%;
            font-size: 0.9rem;
        }

        .msg.bot { background: var(--glass); align-self: flex-start; }
        .msg.user { background: var(--accent); color: white; align-self: flex-end; }

        .chat-input {
            padding: 20px;
            display: flex;
            gap: 10px;
            border-top: 1px solid var(--glass-border);
        }

        .chat-input input {
            flex-grow: 1;
            background: var(--glass);
            border: none;
            padding: 10px;
            border-radius: 10px;
            color: var(--text-primary);
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Overlay */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 1500;
            display: none;
        }

        #overlay.active { display: block; }

        @media (max-width: 768px) {
            .product-grid { grid-template-columns: 1fr; }
            #cart-drawer { max-width: 100%; right: -100%; }
        }
    </style>
</head>
<body>

    <div id="overlay"></div>

    <nav>
        <div class="logo" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">NovaCart</div>
        <div class="nav-actions">
            <button class="nav-icon" id="theme-toggle">🌓</button>
            <button class="nav-icon" onclick="toggleCart()">
                🛒 <span class="cart-count" id="cart-count">0</span>
            </button>
        </div>
    </nav>

    <header class="hero">
        <h1>NovaCart. 2026</h1>
        <p>Intelligence in every detail. Discover the next generation of premium tech accessories designed for the NovaCart lifestyle.</p>
        <img src="images/watch-1.jpg" class="hero-img" alt="Featured Tech">
    </header>

    <div class="search-container">
        <input type="text" class="search-input" id="search-bar" placeholder="Search the NovaCart ecosystem...">
    </div>

    <h2 class="section-title">New Arrivals</h2>
    <div class="product-grid" id="product-grid">
        <!-- Products injected by JS -->
    </div>

    <aside id="cart-drawer">
        <div class="cart-header">
            <h2>Your Bag</h2>
            <button class="nav-icon" onclick="toggleCart()">✕</button>
        </div>
        <div class="cart-items" id="cart-items">
            <!-- Cart items injected by JS -->
        </div>
        <div class="cart-footer">
            <div class="total-row">
                <span>Total</span>
                <span id="cart-total">$0.00</span>
            </div>
            <button class="checkout-btn" onclick="checkout()">Checkout NovaCart Express</button>
        </div>
    </aside>

    <div id="chat-widget">
        <div id="chat-window">
            <div class="chat-header">NovaCart Assistant (Gemini AI)</div>
            <div class="chat-messages" id="chat-messages">
                <div class="msg bot">Hello! How can I help you explore NovaCart today?</div>
            </div>
            <div class="chat-input">
                <input type="text" id="chat-input-field" placeholder="Ask anything...">
                <button class="nav-icon" id="send-chat">➔</button>
            </div>
        </div>
        <button id="chat-trigger">💬</button>
    </div>

    <script>
        const products = [
            { id: 1, name: "NovaWatch Ultra", price: 799, category: "Wearables", img: "watch-1.jpg", desc: "Aerospace-grade titanium for the ultimate NovaCart athlete." },
            { id: 2, name: "Aurora Chrono", price: 599, category: "Wearables", img: "watch-2.jpg", desc: "Precision movement wrapped in sapphire crystal." },
            { id: 3, name: "Midnight Stealth", price: 450, category: "Wearables", img: "watch-3.jpg", desc: "The dark side of timekeeping, refined by NovaCart." },
            { id: 4, name: "NovaLink Pro", price: 299, category: "Audio", img: "1.jpg", desc: "Immersive spatial audio for the NovaCart generation." },
            { id: 5, name: "Carbon Fiber Shell", price: 120, category: "Apparel", img: "jacket-1.jpg", desc: "Adaptive climate control for urban explorers." },
            { id: 6, name: "Prism Optic Glasses", price: 350, category: "Accessories", img: "jewellery-1.jpg", desc: "Smart filtering lenses for digital Nomads." },
            { id: 7, name: "Sonic Sole Runners", price: 180, category: "Footwear", img: "shoe-1.jpg", desc: "Energy return technology in every step." },
            { id: 8, name: "Nebula Scent No. 5", price: 140, category: "Lifestyle", img: "perfume.jpg", desc: "The olfactory signature of NovaCart." },
            { id: 9, name: "Tech Knit Tee", price: 85, category: "Apparel", img: "shirt-1.jpg", desc: "Breathable fabric engineered for performance." },
            { id: 10, name: "Guardian Smart Belt", price: 110, category: "Accessories", img: "belt.jpg", desc: "Biometric tracking integrated into leather." },
            { id: 11, name: "Apex Chrono Silver", price: 620, category: "Wearables", img: "watch-4.jpg", desc: "Classic aesthetics meets NovaCart intelligence." },
            { id: 12, name: "Voyager Pack", price: 210, category: "Lifestyle", img: "2.jpg", desc: "Waterproof storage for your NovaCart devices." }
        ];

        let cart = JSON.parse(localStorage.getItem('novacart_cart')) || [];

        // Initialize Products
        function renderProducts(filter = "") {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = "";
            
            const filtered = products.filter(p => 
                p.name.toLowerCase().includes(filter.toLowerCase()) || 
                p.category.toLowerCase().includes(filter.toLowerCase())
            );

            filtered.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card">
                        <img src="images/${p.img}" class="product-img" alt="${p.name}">
                        <div class="product-info">
                            <div class="product-category">${p.category}</div>
                            <div class="product-name">${p.name}</div>
                            <p class="product-desc">${p.desc}</p>
                            <div class="product-footer">
                                <span class="price">$${p.price}</span>
                                <button class="add-btn" onclick="addToCart(${p.id})">Add to Bag</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // Cart Functions
        function toggleCart() {
            document.getElementById('cart-drawer').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const exists = cart.find(item => item.id === id);
            
            if(exists) {
                exists.qty++;
            } else {
                cart.push({...product, qty: 1});
            }
            updateCart();
            openCartDrawer();
        }

        function openCartDrawer() {
            document.getElementById('cart-drawer').classList.add('active');
            document.getElementById('overlay').classList.add('active');
        }

        function updateCart() {
            localStorage.setItem('novacart_cart', JSON.stringify(cart));
            const container = document.getElementById('cart-items');
            const count = document.getElementById('cart-count');
            const total = document.getElementById('cart-total');
            
            container.innerHTML = "";
            let totalVal = 0;
            let totalQty = 0;

            cart.forEach(item => {
                totalVal += item.price * item.qty;
                totalQty += item.qty;
                container.innerHTML += `
                    <div class="cart-item">
                        <img src="images/${item.img}">
                        <div class="cart-item-info">
                            <h4>${item.name}</h4>
                            <p>$${item.price}</p>
                            <div class="qty-controls">
                                <button class="qty-btn" onclick="changeQty(${item.id}, -1)">-</button>
                                <span>${item.qty}</span>
                                <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            count.innerText = totalQty;
            total.innerText = `$${totalVal.toLocaleString()}`;
        }

        function changeQty(id, delta) {
            const index = cart.findIndex(item => item.id === id);
            cart[index].qty += delta;
            if(cart[index].qty < 1) cart.splice(index, 1);
            updateCart();
        }

        function checkout() {
            if(cart.length === 0) return alert("Your NovaCart is empty!");
            alert("Redirecting to NovaCart Secure Checkout...");
            cart = [];
            updateCart();
            toggleCart();
        }

        // Search Logic
        document.getElementById('search-bar').addEventListener('input', (e) => {
            renderProducts(e.target.value);
        });

        // Theme Toggle
        document.getElementById('theme-toggle').addEventListener('click', () => {
            const body = document.documentElement;
            const current = body.getAttribute('data-theme');
            body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        });

        // Chatbot Mock (Gemini AI Simulation)
        const chatTrigger = document.getElementById('chat-trigger');
        const chatWindow = document.getElementById('chat-window');
        const chatInput = document.getElementById('chat-input-field');
        const chatMessages = document.getElementById('chat-messages');
        const sendChat = document.getElementById('send-chat');

        chatTrigger.addEventListener('click', () => chatWindow.classList.toggle('active'));

        async function handleChat() {
            const text = chatInput.value.trim();
            if(!text) return;

            chatMessages.innerHTML += `<div class="msg user">${text}</div>`;
            chatInput.value = "";
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // Simulate Gemini response
            setTimeout(() => {
                let response = "That's a great question about the NovaCart ecosystem. Our products represent the peak of 2026 technology.";
                if(text.toLowerCase().includes("watch")) response = "The NovaWatch Ultra features a 100-hour battery and neural health tracking.";
                if(text.toLowerCase().includes("price")) response = "NovaCart offers premium value starting from $85 up to $799.";
                
                chatMessages.innerHTML += `<div class="msg bot">${response}</div>`;
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }, 1000);
        }

        sendChat.addEventListener('click', handleChat);
        chatInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleChat(); });

        // Scroll Effects
        window.addEventListener('scroll', () => {
            const heroImg = document.querySelector('.hero-img');
            const scroll = window.pageYOffset;
            heroImg.style.transform = `translateY(${scroll * 0.4}px)`;
        });

        // Initial Load
        document.addEventListener('DOMContentLoaded', () => {
            renderProducts();
            updateCart();
        });

        // Overlay Close
        document.getElementById('overlay').addEventListener('click', () => {
            document.getElementById('cart-drawer').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        });
    </script>
</body>
</html>
