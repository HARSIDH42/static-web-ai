<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaCart | Premium Tech Store</title>
    <style>
        :root {
            --bg: #050505;
            --surface: #121212;
            --accent: #0071e3;
            --text-main: #f5f5f7;
            --text-dim: #86868b;
            --glass: rgba(20, 20, 20, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --radius-lg: 24px;
            --radius-md: 12px;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* Glassmorphism Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 80px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            z-index: 1000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-main);
            text-decoration: none;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .search-container {
            position: relative;
        }

        #search-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            width: 250px;
            transition: var(--transition);
        }

        #search-input:focus {
            width: 350px;
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
        }

        .cart-trigger {
            position: relative;
            cursor: pointer;
            padding: 8px;
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--accent);
            color: white;
            font-size: 0.7rem;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* Hero NovaCart Section */
        .hero {
            height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            padding: 0 20px;
            margin-bottom: 60px;
        }

        .hero h1 {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 24px;
            background: linear-gradient(180deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            color: var(--text-dim);
            font-size: 1.25rem;
            max-width: 600px;
            margin-bottom: 40px;
        }

        /* Product Grid NovaCart */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 5%;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 32px;
            padding-bottom: 100px;
        }

        .product-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 24px;
            border: 1px solid var(--border);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .product-visual {
            aspect-ratio: 1/1;
            background: linear-gradient(45deg, #1a1a1a, #2a2a2a);
            border-radius: var(--radius-md);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* CSS Placeholder Visuals */
        .visual-blob {
            width: 60%;
            height: 60%;
            filter: blur(40px);
            opacity: 0.6;
            border-radius: 50%;
        }

        .visual-icon {
            position: absolute;
            font-size: 4rem;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        .product-info h3 {
            font-size: 1.4rem;
            margin-bottom: 8px;
        }

        .product-info p {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .price {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .add-btn {
            background: var(--text-main);
            color: var(--bg);
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .add-btn:hover {
            background: var(--accent);
            color: white;
            transform: scale(1.05);
        }

        /* Cart Drawer NovaCart */
        .cart-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: none;
            opacity: 0;
            transition: var(--transition);
        }

        .cart-drawer {
            position: fixed;
            right: -450px;
            top: 0;
            width: 450px;
            height: 100%;
            background: var(--surface);
            z-index: 2001;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            padding: 40px;
            border-left: 1px solid var(--border);
        }

        .cart-drawer.active {
            right: 0;
        }

        .cart-overlay.active {
            display: block;
            opacity: 1;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .close-cart {
            cursor: pointer;
            font-size: 1.5rem;
            background: none;
            border: none;
            color: var(--text-main);
        }

        .cart-items {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .cart-item {
            display: flex;
            gap: 16px;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .cart-item-visual {
            width: 60px;
            height: 60px;
            background: #222;
            border-radius: 8px;
        }

        .cart-item-info {
            flex-grow: 1;
        }

        .cart-item-info h4 { font-size: 1rem; }
        .cart-item-info p { color: var(--text-dim); font-size: 0.8rem; }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
        }

        .qty-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            cursor: pointer;
        }

        .cart-footer {
            margin-top: 40px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 24px;
        }

        .checkout-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .checkout-btn:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
        }

        /* Responsive NovaCart */
        @media (max-width: 768px) {
            .cart-drawer { width: 100%; right: -100%; }
            #search-input { width: 150px; }
            #search-input:focus { width: 180px; }
            .hero h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">NovaCart</a>
        <div class="nav-actions">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search gadgets...">
            </div>
            <div class="cart-trigger" onclick="toggleCart(true)">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                <span class="cart-count">0</span>
            </div>
        </div>
    </header>

    <section class="hero">
        <h1>Experience Future.</h1>
        <p>Discover the next generation of smart accessories meticulously designed for your digital NovaCart life.</p>
    </section>

    <main class="container">
        <div class="product-grid" id="product-grid">
            <!-- Products injected by JS -->
        </div>
    </main>

    <div class="cart-overlay" id="cart-overlay" onclick="toggleCart(false)"></div>
    <div class="cart-drawer" id="cart-drawer">
        <div class="cart-header">
            <h2>Your Bag</h2>
            <button class="close-cart" onclick="toggleCart(false)">&times;</button>
        </div>
        <div class="cart-items" id="cart-items">
            <!-- Cart items injected by JS -->
        </div>
        <div class="cart-footer">
            <div class="total-row">
                <span>Total</span>
                <span id="cart-total">$0.00</span>
            </div>
            <button class="checkout-btn">Checkout Now</button>
        </div>
    </div>

    <script>
        // Data
        const products = [
            { id: 1, name: "NovaWatch Ultra", price: 799, category: "Wearables", color: "#007AFF", icon: "⌚" },
            { id: 2, name: "SonicPods Pro", price: 249, category: "Audio", color: "#FF2D55", icon: "🎧" },
            { id: 3, name: "CoreHub Max", price: 159, category: "Accessories", color: "#AF52DE", icon: "🔌" },
            { id: 4, name: "GlowCharge Pad", price: 89, category: "Power", color: "#34C759", icon: "⚡" },
            { id: 5, name: "LumenKey Pro", price: 199, category: "Input", color: "#5856D6", icon: "⌨️" },
            { id: 6, name: "VisionFrame X", price: 1299, category: "Wearables", color: "#FF9500", icon: "🕶️" }
        ];

        let cart = JSON.parse(localStorage.getItem('novaCartData')) || [];

        // Elements
        const productGrid = document.getElementById('product-grid');
        const cartItemsContainer = document.getElementById('cart-items');
        const cartCount = document.querySelector('.cart-count');
        const cartTotal = document.getElementById('cart-total');
        const searchInput = document.getElementById('search-input');
        const cartDrawer = document.getElementById('cart-drawer');
        const cartOverlay = document.getElementById('cart-overlay');

        // Initialize NovaCart
        function init() {
            renderProducts(products);
            updateCartUI();
        }

        // Render Product Grid
        function renderProducts(items) {
            productGrid.innerHTML = items.map(product => `
                <div class="product-card">
                    <div class="product-visual">
                        <div class="visual-blob" style="background: ${product.color}"></div>
                        <div class="visual-icon">${product.icon}</div>
                    </div>
                    <div class="product-info">
                        <p>${product.category}</p>
                        <h3>${product.name}</h3>
                    </div>
                    <div class="product-footer">
                        <span class="price">$${product.price}</span>
                        <button class="add-btn" onclick="addToCart(${product.id})">Add to Bag</button>
                    </div>
                </div>
            `).join('');
        }

        // Cart Logic
        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const existing = cart.find(item => item.id === id);

            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            saveAndUpdate();
            toggleCart(true);
        }

        function updateQuantity(id, delta) {
            const item = cart.find(item => item.id === id);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) {
                    cart = cart.filter(i => i.id !== id);
                }
            }
            saveAndUpdate();
        }

        function saveAndUpdate() {
            localStorage.setItem('novaCartData', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            // Update counter
            const totalItems = cart.reduce((acc, item) => acc + item.quantity, 0);
            cartCount.textContent = totalItems;

            // Update items
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<p style="text-align:center; color:var(--text-dim); margin-top:20px;">Your bag is empty.</p>';
            } else {
                cartItemsContainer.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div class="cart-item-visual" style="background: linear-gradient(45deg, ${item.color}44, ${item.color}22)"></div>
                        <div class="cart-item-info">
                            <h4>${item.name}</h4>
                            <p>$${item.price}</p>
                            <div class="qty-controls">
                                <button class="qty-btn" onclick="updateQuantity(${item.id}, -1)">-</button>
                                <span>${item.quantity}</span>
                                <button class="qty-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            // Update Total
            const total = cart.reduce((acc, item) => acc + (item.price * item.quantity), 0);
            cartTotal.textContent = `$${total.toFixed(2)}`;
        }

        // UI Controls
        function toggleCart(show) {
            if (show) {
                cartOverlay.classList.add('active');
                cartDrawer.classList.add('active');
            } else {
                cartOverlay.classList.remove('active');
                cartDrawer.classList.remove('active');
            }
        }

        // Live Search NovaCart Functionality
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = products.filter(p => 
                p.name.toLowerCase().includes(term) || 
                p.category.toLowerCase().includes(term)
            );
            renderProducts(filtered);
        });

        // Load NovaCart
        window.onload = init;
    </script>
</body>
</html>
