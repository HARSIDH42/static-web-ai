<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaCart | The Future of Tech & Lifestyle</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --accent: #0071e3;
            --glass: rgba(255, 255, 255, 0.7);
            --card-bg: #f5f5f7;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --border: rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            --bg: #000000;
            --text: #ffffff;
            --accent: #2997ff;
            --glass: rgba(0, 0, 0, 0.7);
            --card-bg: #1c1c1e;
            --border: rgba(255,255,255,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            transition: background-color 0.5s ease;
        }

        /* Glassmorphism Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            cursor: pointer;
        }

        nav {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text);
            font-size: 14px;
            opacity: 0.8;
            transition: var(--transition);
        }

        .nav-link:hover { opacity: 1; }

        .icons {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
            position: relative;
            font-size: 18px;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--accent);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            background: linear-gradient(to bottom, transparent 0%, var(--bg) 100%);
            position: relative;
            overflow: hidden;
        }

        .hero-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            opacity: 0.6;
        }

        .hero h1 {
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 800;
            line-height: 1;
            margin-bottom: 20px;
            letter-spacing: -2px;
        }

        .hero p {
            font-size: 1.5rem;
            max-width: 600px;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        .btn-primary {
            background: var(--text);
            color: var(--bg);
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .btn-primary:hover {
            transform: scale(1.05);
        }

        /* Search Bar */
        .search-container {
            padding: 100px 5% 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        #searchInput {
            width: 100%;
            padding: 20px 30px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            font-size: 1.2rem;
            outline: none;
            transition: var(--transition);
        }

        /* Product Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            padding: 40px 5%;
            max-width: 1600px;
            margin: 0 auto;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 20px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            border: 1px solid transparent;
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
        }

        .product-card img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .product-info h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .product-info p {
            font-size: 0.9rem;
            opacity: 0.6;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .add-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: var(--transition);
        }

        .add-btn:hover { transform: rotate(90deg); }

        /* Cart Drawer */
        .cart-drawer {
            position: fixed;
            right: -400px;
            top: 0;
            width: 400px;
            height: 100vh;
            background: var(--bg);
            z-index: 2000;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
        }

        .cart-drawer.open { right: 0; }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .cart-items {
            flex-grow: 1;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .cart-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
        }

        .cart-item-details {
            flex-grow: 1;
        }

        .qty-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 10px;
        }

        .qty-btn {
            background: var(--card-bg);
            border: none;
            color: var(--text);
            width: 25px;
            height: 25px;
            border-radius: 5px;
            cursor: pointer;
        }

        .cart-footer {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .checkout-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1500;
            display: none;
            backdrop-filter: blur(5px);
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate {
            animation: fadeInUp 0.8s ease forwards;
        }

        /* Dark Mode Toggle */
        .theme-switch {
            width: 50px;
            height: 25px;
            background: #ccc;
            border-radius: 25px;
            position: relative;
            cursor: pointer;
        }

        .theme-switch::before {
            content: '';
            position: absolute;
            width: 21px;
            height: 21px;
            border-radius: 50%;
            background: white;
            top: 2px;
            left: 2px;
            transition: 0.3s;
        }

        [data-theme="dark"] .theme-switch { background: var(--accent); }
        [data-theme="dark"] .theme-switch::before { transform: translateX(25px); }

        /* Scroll Progress */
        #scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: var(--accent);
            z-index: 1001;
            width: 0%;
        }

        @media (max-width: 768px) {
            .cart-drawer { width: 100%; right: -100%; }
            .hero h1 { font-size: 3.5rem; }
            nav { display: none; }
        }
    </style>
</head>
<body data-theme="dark">
    <div id="scroll-progress"></div>
    <div class="overlay" onclick="toggleCart()"></div>

    <header>
        <div class="logo">NovaCart</div>
        <nav>
            <a href="#" class="nav-link">Store</a>
            <a href="#" class="nav-link">Gadgets</a>
            <a href="#" class="nav-link">Lifestyle</a>
            <a href="#" class="nav-link">Support</a>
        </nav>
        <div class="icons">
            <div class="theme-switch" onclick="toggleTheme()"></div>
            <button class="icon-btn" onclick="toggleCart()">
                🛒 <span class="cart-count" id="cartCount">0</span>
            </button>
        </div>
    </header>

    <main id="main-content">
        <!-- Hero Section -->
        <section class="hero">
            <img src="images/1.jpg" class="hero-img" alt="Luxury Tech">
            <h1 class="animate">Beyond Tomorrow.</h1>
            <p class="animate" style="animation-delay: 0.2s;">Discover the NovaCart selection of premium smart gadgets and curated lifestyle essentials for 2026.</p>
            <a href="#products" class="btn-primary animate" style="animation-delay: 0.4s;">Shop the NovaCart Collection</a>
        </section>

        <!-- Search -->
        <div class="search-container" id="products">
            <input type="text" id="searchInput" placeholder="Search NovaCart products..." oninput="filterProducts()">
        </div>

        <!-- Product Grid -->
        <div class="grid" id="productGrid">
            <!-- JS will populate this -->
        </div>
    </main>

    <!-- Cart Drawer -->
    <div class="cart-drawer" id="cartDrawer">
        <div class="cart-header">
            <h2>Your Bag</h2>
            <button class="icon-btn" onclick="toggleCart()">✕</button>
        </div>
        <div class="cart-items" id="cartItems">
            <!-- JS will populate this -->
        </div>
        <div class="cart-footer">
            <div class="total-row">
                <span>Total</span>
                <span id="cartTotal">$0.00</span>
            </div>
            <button class="checkout-btn" onclick="checkout()">Checkout NovaCart Express</button>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "NovaCart Chronos S1", price: 399, img: "images/watch-1.jpg", desc: "Titanium sapphire glass smart timepiece with 14-day battery." },
            { id: 2, name: "Aura Essence No. 5", price: 120, img: "images/perfume.jpg", desc: "A sensory journey encapsulated in a crystal glass flacon." },
            { id: 3, name: "Gravity Sneakers", price: 250, img: "images/shoe-1.jpg", desc: "Propulsive foam technology for the ultimate urban stroll." },
            { id: 4, name: "Urban Shell Jacket", price: 450, img: "images/jacket-1.jpg", desc: "Gore-Tex Infinite protection for modern explorers." },
            { id: 5, name: "NovaCart Vision Glass", price: 899, img: "images/watch-3.jpg", desc: "AR-enabled ocular wear for seamless digital integration." },
            { id: 6, name: "Silk Knit NovaCart Tee", price: 85, img: "images/shirt-1.jpg", desc: "Hand-woven organic silk blend for unparalleled comfort." },
            { id: 7, name: "SoundSlab Pro", price: 299, img: "images/2.jpg", desc: "Omni-directional audio experience in a minimalist slab." },
            { id: 8, name: "Carbon Fiber Belt", price: 150, img: "images/belt.jpg", desc: "Aerospace-grade buckle with infinite adjustment track." },
            { id: 9, name: "NovaCart Chronos S2", price: 450, img: "images/watch-2.jpg", desc: "The evolved timepiece with cellular connectivity." },
            { id: 10, name: "Elements Parka", price: 600, img: "images/jacket-2.jpg", desc: "Thermal regulated insulation for sub-zero environments." },
            { id: 11, name: "Velocita Run S4", price: 180, img: "images/shoe-4.jpg", desc: "Ultralight marathon-ready performance footwear." },
            { id: 12, name: "NovaCart Glow Shampoo", price: 45, img: "images/shampoo.jpg", desc: "Molecular hair repair formula for daily luxury." },
            { id: 13, name: "Titanium Cufflinks", price: 210, img: "images/jewellery-1.jpg", desc: "Precision-milled titanium for the modern professional." },
            { id: 14, name: "NovaCart Active Shorts", price: 75, img: "images/shorts-1.jpg", desc: "Four-way stretch fabric with hidden tech pockets." },
            { id: 15, name: "Nomad Backpack", price: 320, img: "images/jacket-5.jpg", desc: "Modular storage solutions for the digital nomad." },
            { id: 16, name: "Prime Leather Shoe", price: 280, img: "images/shoe-2.jpg", desc: "Hand-burnished Italian calfskin with orthotic soles." },
            { id: 17, name: "NovaCart Night Watch", price: 550, img: "images/watch-4.jpg", desc: "Stealth black coating with high-luminance markers." },
            { id: 18, name: "Tech Blazer 2026", price: 480, img: "images/jacket-3.jpg", desc: "Wrinkle-free tech fabric tailored for the boardroom." },
            { id: 19, name: "Orbit Pendant", price: 350, img: "images/jewellery-2.jpg", desc: "A floating diamond setting that captures the light." },
            { id: 20, name: "NovaCart Cloud Shoe", price: 210, img: "images/shoe-5.jpg", desc: "Zero-gravity cushion for all-day standing comfort." }
        ];

        let cart = JSON.parse(localStorage.getItem('novacart-bag')) || [];

        // Initialize NovaCart Store
        function initStore() {
            renderProducts(products);
            updateCartUI();
            window.addEventListener('scroll', updateScrollProgress);
        }

        function renderProducts(items) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = items.map(p => `
                <div class="product-card animate">
                    <img src="${p.img}" alt="${p.name}" loading="lazy">
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <p>${p.desc}</p>
                        <div class="price-row">
                            <span class="price">$${p.price}</span>
                            <button class="add-btn" onclick="addToBag(${p.id})">+</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterProducts() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = products.filter(p => 
                p.name.toLowerCase().includes(term) || 
                p.desc.toLowerCase().includes(term)
            );
            renderProducts(filtered);
        }

        // Cart Functionality
        function addToBag(id) {
            const product = products.find(p => p.id === id);
            const exists = cart.find(item => item.id === id);
            
            if (exists) {
                exists.qty++;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            
            saveCart();
            updateCartUI();
            if(!document.getElementById('cartDrawer').classList.contains('open')) {
                toggleCart();
            }
        }

        function changeQty(id, delta) {
            const item = cart.find(p => p.id === id);
            if (item) {
                item.qty += delta;
                if (item.qty <= 0) {
                    cart = cart.filter(p => p.id !== id);
                }
                saveCart();
                updateCartUI();
            }
        }

        function saveCart() {
            localStorage.setItem('novacart-bag', JSON.stringify(cart));
        }

        function updateCartUI() {
            const itemsContainer = document.getElementById('cartItems');
            const count = document.getElementById('cartCount');
            const total = document.getElementById('cartTotal');
            
            let totalItems = 0;
            let totalPrice = 0;
            
            itemsContainer.innerHTML = cart.map(item => {
                totalItems += item.qty;
                totalPrice += (item.price * item.qty);
                return `
                    <div class="cart-item">
                        <img src="${item.img}" alt="${item.name}">
                        <div class="cart-item-details">
                            <h4>${item.name}</h4>
                            <p>$${item.price}</p>
                            <div class="qty-controls">
                                <button class="qty-btn" onclick="changeQty(${item.id}, -1)">-</button>
                                <span>${item.qty}</span>
                                <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            count.innerText = totalItems;
            total.innerText = `$${totalPrice.toLocaleString()}`;
        }

        function toggleCart() {
            const drawer = document.getElementById('cartDrawer');
            const overlay = document.querySelector('.overlay');
            drawer.classList.toggle('open');
            overlay.style.display = drawer.classList.contains('open') ? 'block' : 'none';
        }

        // Theme Toggle
        function toggleTheme() {
            const body = document.body;
            const current = body.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', next);
            localStorage.setItem('novacart-theme', next);
        }

        // Scroll Progress
        function updateScrollProgress() {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById("scroll-progress").style.width = scrolled + "%";
        }

        function checkout() {
            if(cart.length === 0) return alert("Your NovaCart bag is empty!");
            alert("NovaCart Checkout Secure Connection Established. Total: " + document.getElementById('cartTotal').innerText);
            cart = [];
            saveCart();
            updateCartUI();
            toggleCart();
        }

        // Apply saved theme
        const savedTheme = localStorage.getItem('novacart-theme');
        if(savedTheme) document.body.setAttribute('data-theme', savedTheme);

        // Smooth Scrolling for anchor links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });

        // Initialize on load
        window.onload = initStore;
    </script>
</body>
</html>
