<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaCart | Premium Tech Ecosystem</title>
    <style>
        :root {
            --bg: #ffffff;
            --fg: #000000;
            --accent: #0071e3;
            --glass: rgba(255, 255, 255, 0.7);
            --border: rgba(0, 0, 0, 0.1);
            --card-bg: #f5f5f7;
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg: #000000;
            --fg: #ffffff;
            --accent: #2997ff;
            --glass: rgba(0, 0, 0, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --card-bg: #1d1d1f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            overflow-x: hidden;
            transition: background-color 0.5s ease;
        }

        /* Glassmorphism Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            cursor: pointer;
        }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--fg);
            cursor: pointer;
            font-size: 1.2rem;
            position: relative;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -10px;
            background: var(--accent);
            color: white;
            font-size: 0.7rem;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 20px;
            background: radial-gradient(circle at center, var(--card-bg) 0%, var(--bg) 100%);
        }

        .hero h1 {
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 700;
            margin-bottom: 20px;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s forwards 0.2s;
        }

        .hero p {
            font-size: 1.5rem;
            color: #86868b;
            max-width: 600px;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s forwards 0.4s;
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Search Bar */
        .search-container {
            padding: 100px 5% 20px;
            display: flex;
            justify-content: center;
        }

        .search-input {
            width: 100%;
            max-width: 600px;
            padding: 15px 25px;
            border-radius: 30px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--fg);
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }

        .search-input:focus {
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.2);
        }

        /* Product Grid */
        .product-section {
            padding: 80px 5%;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-card:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .product-img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .product-info h3 {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .product-info p {
            color: #86868b;
            font-size: 0.9rem;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .price-tag {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .add-btn {
            background: var(--fg);
            color: var(--bg);
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            margin-top: 15px;
        }

        .add-btn:hover {
            background: var(--accent);
            color: white;
        }

        /* Cart Drawer */
        .cart-drawer {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100vh;
            background: var(--bg);
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
            z-index: 2000;
            transition: var(--transition);
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
        }

        .cart-drawer.active {
            right: 0;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .cart-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
        }

        .cart-footer {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid var(--border);
        }

        /* Chatbot */
        #chat-widget {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1500;
        }

        #chat-btn {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: var(--accent);
            color: white;
            border: none;
            box-shadow: 0 10px 20px rgba(0,113,227,0.3);
            cursor: pointer;
            font-size: 1.5rem;
        }

        #chat-window {
            position: absolute;
            bottom: 80px;
            right: 0;
            width: 350px;
            height: 450px;
            background: var(--bg);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            display: none;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        #chat-window.active { display: flex; }

        .chat-header {
            background: var(--accent);
            color: white;
            padding: 15px;
            font-weight: 600;
        }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            font-size: 0.9rem;
        }

        .chat-input {
            display: flex;
            padding: 15px;
            border-top: 1px solid var(--border);
        }

        .chat-input input {
            flex: 1;
            border: none;
            background: var(--card-bg);
            padding: 10px;
            border-radius: 20px;
            color: var(--fg);
            outline: none;
        }

        /* Overlay */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);
            z-index: 1900;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        @media (max-width: 600px) {
            .cart-drawer { width: 100%; right: -100%; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body data-theme="light">

    <header>
        <div class="logo">NovaCart</div>
        <div class="nav-controls">
            <button class="icon-btn" onclick="toggleTheme()" title="Toggle Theme">🌓</button>
            <button class="icon-btn" onclick="toggleCart()" title="NovaCart Bag">
                👜 <span class="cart-count" id="cart-badge">0</span>
            </button>
        </div>
    </header>

    <div class="overlay" id="overlay" onclick="toggleCart()"></div>

    <!-- Hero Section -->
    <section class="hero">
        <h1>NovaCart Intelligence.</h1>
        <p>Experience the next generation of smart tech. Minimalist design, powerful performance, and a soul defined by NovaCart innovation.</p>
    </section>

    <!-- Search Section -->
    <div class="search-container">
        <input type="text" class="search-input" id="search-input" placeholder="Search the NovaCart ecosystem..." onkeyup="filterProducts()">
    </div>

    <!-- Product Grid -->
    <section class="product-section">
        <div class="grid" id="product-grid">
            <!-- Products injected by JS -->
        </div>
    </section>

    <!-- Cart Drawer -->
    <div class="cart-drawer" id="cart-drawer">
        <div class="cart-header">
            <h2>NovaCart Bag</h2>
            <button class="icon-btn" onclick="toggleCart()">✕</button>
        </div>
        <div class="cart-items" id="cart-items">
            <!-- Cart items injected here -->
        </div>
        <div class="cart-footer">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: 700; font-size: 1.2rem;">
                <span>Total</span>
                <span id="cart-total">$0.00</span>
            </div>
            <button class="add-btn" style="width: 100%; padding: 18px;" onclick="checkout()">Checkout NovaCart</button>
        </div>
    </div>

    <!-- Chatbot -->
    <div id="chat-widget">
        <div id="chat-window">
            <div class="chat-header">NovaCart AI Assistant (Gemini Core)</div>
            <div class="chat-messages" id="chat-messages">
                <div style="margin-bottom: 10px;"><b>NovaCart AI:</b> Hello! How can I help you explore the NovaCart store today?</div>
            </div>
            <div class="chat-input">
                <input type="text" id="chat-query" placeholder="Ask NovaCart..." onkeypress="handleChat(event)">
            </div>
        </div>
        <button id="chat-btn" onclick="toggleChat()">✨</button>
    </div>

    <script>
        // Premium Product Data
        const products = [
            { id: 1, name: "NovaCart Chronos V1", price: 499, img: "watch-1.jpg", desc: "Advanced health monitoring with sapphire glass." },
            { id: 2, name: "NovaCart Chronos S", price: 599, img: "watch-2.jpg", desc: "Aerospace-grade titanium housing." },
            { id: 3, name: "Aura Smart Diffuser", price: 129, img: "perfume.jpg", desc: "Intelligent scent dispersion controlled by NovaCart app." },
            { id: 4, name: "Neural Ring X", price: 299, img: "jewellery-1.jpg", desc: "Haptic feedback and contactless payments in a ring." },
            { id: 5, name: "NovaCart Pulse Buds", price: 199, img: "jewellery-2.jpg", desc: "Studio-quality audio in a compact form factor." },
            { id: 6, name: "Thermal Core Parka", price: 899, img: "jacket-1.jpg", desc: "Self-heating fibers powered by NovaCart battery tech." },
            { id: 7, name: "Step-Sync Pro", price: 349, img: "shoe-1.jpg", desc: "Self-lacing performance sneakers with gait analysis." },
            { id: 8, name: "NovaCart Active Glass", price: 799, img: "watch-3.jpg", desc: "The future of augmented reality on your wrist." },
            { id: 9, name: "Nano-Fiber Tee", price: 85, img: "clothes-1.jpg", desc: "Stain-resistant and temperature regulating." },
            { id: 10, name: "NovaCart Aero Belt", price: 150, img: "belt.jpg", desc: "Micro-adjustment buckle with hidden GPS tracker." },
            { id: 11, name: "Visionary shades", price: 220, img: "jewellery-3.jpg", desc: "Adaptive tinting based on light intensity." },
            { id: 12, name: "NovaCart Core Shell", price: 450, img: "jacket-2.jpg", desc: "Waterproof, breathable, and virtually indestructible." }
        ];

        let cart = JSON.parse(localStorage.getItem('novacart-cart')) || [];

        // Initialize Store
        function initStore() {
            renderProducts(products);
            updateCartUI();
        }

        function renderProducts(items) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = items.map(p => `
                <div class="product-card">
                    <div>
                        <img src="images/${p.img}" class="product-img" alt="${p.name}">
                        <div class="product-info">
                            <h3>${p.name}</h3>
                            <p>${p.desc}</p>
                            <div class="price-tag">$${p.price}</div>
                        </div>
                    </div>
                    <button class="add-btn" onclick="addToCart(${p.id})">Add to Bag</button>
                </div>
            `).join('');
        }

        // Search Logic
        function filterProducts() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = products.filter(p => 
                p.name.toLowerCase().includes(query) || 
                p.desc.toLowerCase().includes(query)
            );
            renderProducts(filtered);
        }

        // Cart Logic
        function toggleCart() {
            document.getElementById('cart-drawer').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const existing = cart.find(item => item.id === id);
            
            if (existing) {
                existing.qty++;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            
            saveAndUpdate();
            
            // Animation feedback
            const badge = document.getElementById('cart-badge');
            badge.style.transform = "scale(1.5)";
            setTimeout(() => badge.style.transform = "scale(1)", 200);
        }

        function updateQty(id, delta) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.qty += delta;
                if (item.qty <= 0) {
                    cart = cart.filter(i => i.id !== id);
                }
            }
            saveAndUpdate();
        }

        function saveAndUpdate() {
            localStorage.setItem('novacart-cart', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            const badge = document.getElementById('cart-badge');
            const totalEl = document.getElementById('cart-total');
            
            let total = 0;
            let count = 0;

            container.innerHTML = cart.map(item => {
                total += item.price * item.qty;
                count += item.qty;
                return `
                    <div class="cart-item">
                        <img src="images/${item.img}" alt="${item.name}">
                        <div style="flex:1">
                            <h4 style="margin-bottom:5px">${item.name}</h4>
                            <div style="font-size:0.9rem; color:#86868b">$${item.price}</div>
                            <div style="display:flex; align-items:center; gap:10px; margin-top:10px">
                                <button class="icon-btn" onclick="updateQty(${item.id}, -1)">-</button>
                                <span>${item.qty}</span>
                                <button class="icon-btn" onclick="updateQty(${item.id}, 1)">+</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            if (cart.length === 0) {
                container.innerHTML = `<p style="text-align:center; margin-top:50px; color:#86868b">Your NovaCart bag is empty.</p>`;
            }

            badge.textContent = count;
            totalEl.textContent = `$${total.toFixed(2)}`;
        }

        // Theme Toggle
        function toggleTheme() {
            const body = document.body;
            const current = body.getAttribute('data-theme');
            const next = current === 'light' ? 'dark' : 'light';
            body.setAttribute('data-theme', next);
        }

        // Chatbot Logic
        function toggleChat() {
            document.getElementById('chat-window').classList.toggle('active');
        }

        function handleChat(e) {
            if (e.key === 'Enter') {
                const input = document.getElementById('chat-query');
                const msg = input.value.trim();
                if (!msg) return;

                const chatMessages = document.getElementById('chat-messages');
                chatMessages.innerHTML += `<div style="margin-bottom:10px; text-align:right;"><b>You:</b> ${msg}</div>`;
                
                input.value = '';

                // Simulate Gemini AI Response
                setTimeout(() => {
                    let response = "I'm analyzing the NovaCart ecosystem for you. Our latest products are built for the year 2026. Would you like to see our NovaCart Chronos collection?";
                    if (msg.toLowerCase().includes('price')) response = "Our NovaCart premium items start at $85 and go up to $899 for high-end gear.";
                    if (msg.toLowerCase().includes('shipping')) response = "NovaCart offers worldwide priority shipping on all orders over $500.";
                    
                    chatMessages.innerHTML += `<div style="margin-bottom:10px;"><b>NovaCart AI:</b> ${response}</div>`;
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }, 1000);
            }
        }

        function checkout() {
            if (cart.length === 0) return alert("Your NovaCart bag is empty!");
            alert("Proceeding to secure NovaCart checkout... Thank you for your purchase!");
            cart = [];
            saveAndUpdate();
            toggleCart();
        }

        // Smooth Scroll effect for header
        window.onscroll = function() {
            const header = document.querySelector('header');
            if (window.scrollY > 50) {
                header.style.height = '50px';
                header.style.fontSize = '0.9rem';
            } else {
                header.style.height = '60px';
                header.style.fontSize = '1rem';
            }
        };

        window.onload = initStore;
    </script>
</body>
</html>
