<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaCart | Premium Smart Gadgets</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --surface: #121212;
            --accent: #007AFF;
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --glass: rgba(20, 20, 20, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --radius: 12px;
            --transition: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- Header & Navigation --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #fff, #555);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .search-container {
            position: relative;
        }

        #search-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 0.6rem 1rem;
            border-radius: 20px;
            color: white;
            outline: none;
            width: 200px;
            transition: width 0.3s var(--transition);
        }

        #search-input:focus {
            width: 300px;
            border-color: var(--accent);
        }

        .cart-trigger {
            position: relative;
            cursor: pointer;
            padding: 5px;
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--accent);
            color: white;
            font-size: 0.7rem;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* --- Hero Section --- */
        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 10%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }

        .hero h1 {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 800;
            line-height: 1;
            margin-bottom: 1.5rem;
            letter-spacing: -3px;
        }

        .hero p {
            color: var(--text-dim);
            max-width: 600px;
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }

        /* --- Product Grid --- */
        .main-container {
            padding: 4rem 5%;
        }

        .section-title {
            margin-bottom: 3rem;
            font-size: 2rem;
            font-weight: 600;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2.5rem;
        }

        .product-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            transition: transform 0.4s var(--transition), border-color 0.4s;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .product-visual {
            width: 100%;
            height: 250px;
            background: linear-gradient(135deg, #1e1e1e 0%, #111 100%);
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* CSS Placeholder Shape Decor */
        .product-visual::before {
            content: '';
            width: 120px;
            height: 120px;
            background: var(--accent);
            filter: blur(60px);
            opacity: 0.3;
        }

        .product-visual::after {
            content: 'NOVA';
            font-weight: 800;
            font-size: 0.8rem;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.1);
        }

        .product-info h3 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }

        .product-desc {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            height: 3rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-footer {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price {
            font-weight: 700;
            font-size: 1.2rem;
        }

        .add-btn {
            background: white;
            color: black;
            border: none;
            padding: 0.8rem 1.2rem;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .add-btn:hover {
            background: var(--accent);
            color: white;
        }

        /* --- Cart Drawer --- */
        .cart-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s var(--transition);
        }

        .cart-drawer {
            position: fixed;
            top: 0;
            right: -450px;
            width: 100%;
            max-width: 450px;
            height: 100%;
            background: var(--surface);
            z-index: 2001;
            padding: 2rem;
            transition: right 0.4s var(--transition);
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border);
        }

        .cart-active .cart-overlay {
            opacity: 1;
            visibility: visible;
        }

        .cart-active .cart-drawer {
            right: 0;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .close-cart {
            cursor: pointer;
            font-size: 1.5rem;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .cart-item-img {
            width: 80px;
            height: 80px;
            background: #1e1e1e;
            border-radius: 8px;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .qty-btn {
            background: #222;
            border: 1px solid var(--border);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            cursor: pointer;
        }

        .cart-footer {
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        .checkout-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 1.2rem;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
        }

        /* --- Utilities --- */
        .empty-cart-msg {
            text-align: center;
            margin-top: 4rem;
            color: var(--text-dim);
        }

        footer {
            padding: 4rem 5%;
            border-top: 1px solid var(--border);
            text-align: center;
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            header { padding: 1rem; }
            #search-input { width: 120px; }
            #search-input:focus { width: 160px; }
            .hero h1 { font-size: 3rem; }
            .cart-drawer { max-width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">NovaCart</div>
        <div class="nav-controls">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search gadgets...">
            </div>
            <div class="cart-trigger" id="cart-open">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                <span class="cart-count" id="cart-count">0</span>
            </div>
        </div>
    </header>

    <section class="hero">
        <h1>Future Defined.</h1>
        <p>Experience the next generation of premium smart technology. Curated excellence for the NovaCart ecosystem.</p>
    </section>

    <main class="main-container">
        <h2 class="section-title">New Arrivals</h2>
        <div class="product-grid" id="product-grid">
            <!-- Products injected by JS -->
        </div>
    </main>

    <div class="cart-overlay" id="cart-overlay"></div>
    <div class="cart-drawer" id="cart-drawer">
        <div class="cart-header">
            <h2>Your Bag</h2>
            <div class="close-cart" id="cart-close">&times;</div>
        </div>
        <div class="cart-items" id="cart-items">
            <!-- Cart items injected by JS -->
        </div>
        <div class="cart-footer">
            <div class="total-row">
                <span>Total</span>
                <span id="cart-total">$0.00</span>
            </div>
            <button class="checkout-btn">Secure Checkout</button>
        </div>
    </div>

    <footer>
        &copy; 2026 NovaCart Inc. All rights reserved. This NovaCart is optimized for high-performance browsing.
    </footer>

    <script>
        // --- Product Data ---
        const products = [
            {
                id: 1,
                name: "NovaCore Pro",
                price: 299.99,
                desc: "Neural-link noise cancellation headset with spatial audio tracking.",
                color: "#007AFF"
            },
            {
                id: 2,
                name: "AuraWatch Ultra",
                price: 449.00,
                desc: "Quantum LED display with 14-day battery and biometric sensors.",
                color: "#FF2D55"
            },
            {
                id: 3,
                name: "Zenith Pad 12",
                price: 899.00,
                desc: "Pressure-sensitive haptic drawing surface for professional creators.",
                color: "#5856D6"
            },
            {
                id: 4,
                name: "Lumina Beam",
                price: 159.50,
                desc: "Smart ambient projector with 4K clarity and voice integration.",
                color: "#AF52DE"
            },
            {
                id: 5,
                name: "Nebula Hub",
                price: 129.00,
                desc: "Central AI orchestrator for your entire home ecosystem.",
                color: "#FF9500"
            },
            {
                id: 6,
                name: "Velocity Grip",
                price: 79.99,
                desc: "Magnetic leveling ergonomic mouse for zero-latency control.",
                color: "#34C759"
            }
        ];

        // --- State Management ---
        let cart = JSON.parse(localStorage.getItem('novacart_storage')) || [];

        // --- Selectors ---
        const productGrid = document.getElementById('product-grid');
        const searchInput = document.getElementById('search-input');
        const cartCount = document.getElementById('cart-count');
        const cartItemsContainer = document.getElementById('cart-items');
        const cartTotal = document.getElementById('cart-total');
        const cartOpen = document.getElementById('cart-open');
        const cartClose = document.getElementById('cart-close');
        const cartOverlay = document.getElementById('cart-overlay');
        const body = document.body;

        // --- Initialization ---
        function init() {
            renderProducts(products);
            updateCartUI();
        }

        // --- Render Products ---
        function renderProducts(items) {
            productGrid.innerHTML = items.map(product => `
                <div class="product-card">
                    <div class="product-visual">
                        <div style="background: ${product.color}; width: 60px; height: 60px; border-radius: 50%; filter: blur(30px); opacity: 0.5;"></div>
                    </div>
                    <div class="product-info">
                        <h3>${product.name}</h3>
                        <p class="product-desc">${product.desc}</p>
                        <div class="product-footer">
                            <span class="price">$${product.price.toFixed(2)}</span>
                            <button class="add-btn" onclick="addToCart(${product.id})">Add to Bag</button>
                        </div>
                    </div>
                </div>
            `).join('');
            
            if(items.length === 0) {
                productGrid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: var(--text-dim); padding: 4rem;">No NovaCart items found matching your search.</p>`;
            }
        }

        // --- Cart Functions ---
        window.addToCart = (id) => {
            const product = products.find(p => p.id === id);
            const existing = cart.find(item => item.id === id);

            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }

            saveCart();
            updateCartUI();
            toggleCart(true);
        };

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            saveCart();
            updateCartUI();
        }

        function updateQuantity(id, delta) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) {
                    removeFromCart(id);
                } else {
                    saveCart();
                    updateCartUI();
                }
            }
        }

        function saveCart() {
            localStorage.setItem('novacart_storage', JSON.stringify(cart));
        }

        function updateCartUI() {
            // Update counter
            const totalQty = cart.reduce((sum, item) => sum + item.quantity, 0);
            cartCount.textContent = totalQty;

            // Render drawer items
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = `<div class="empty-cart-msg">Your NovaCart bag is empty.</div>`;
            } else {
                cartItemsContainer.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div class="cart-item-img" style="background: linear-gradient(45deg, ${item.color}22, #111)"></div>
                        <div class="cart-item-info">
                            <h4>${item.name}</h4>
                            <p style="font-size: 0.8rem; color: var(--text-dim)">$${item.price.toFixed(2)}</p>
                            <div class="cart-item-controls">
                                <button class="qty-btn" onclick="updateQuantity(${item.id}, -1)">-</button>
                                <span>${item.quantity}</span>
                                <button class="qty-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                            </div>
                        </div>
                        <div style="cursor: pointer; opacity: 0.5" onclick="removeFromCart(${item.id})">&times;</div>
                    </div>
                `).join('');
            }

            // Update Total
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            cartTotal.textContent = `$${total.toFixed(2)}`;
        }

        function toggleCart(isOpen) {
            if (isOpen) {
                body.classList.add('cart-active');
            } else {
                body.classList.remove('cart-active');
            }
        }

        // --- Search Functionality ---
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = products.filter(p => 
                p.name.toLowerCase().includes(term) || 
                p.desc.toLowerCase().includes(term)
            );
            renderProducts(filtered);
        });

        // --- Event Listeners ---
        cartOpen.addEventListener('click', () => toggleCart(true));
        cartClose.addEventListener('click', () => toggleCart(false));
        cartOverlay.addEventListener('click', () => toggleCart(false));

        // Global key escape to close NovaCart drawer
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') toggleCart(false);
        });

        // Start NovaCart
        init();
    </script>
</body>
</html>
