<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaCart | Premium Smart Gadgets</title>
    <style>
        :root {
            --bg: #050505;
            --surface: #121212;
            --accent: #0071e3;
            --text: #f5f5f7;
            --text-dim: #86868b;
            --glass: rgba(20, 20, 20, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        /* Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            z-index: 1000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, #86868b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .search-container {
            position: relative;
        }

        #search-input {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            padding: 8px 15px;
            border-radius: 20px;
            color: white;
            outline: none;
            width: 200px;
            transition: var(--transition);
        }

        #search-input:focus {
            width: 300px;
            background: rgba(255,255,255,0.1);
            border-color: var(--accent);
        }

        .cart-trigger {
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -12px;
            background: var(--accent);
            color: white;
            font-size: 0.7rem;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: bold;
        }

        /* Hero Section */
        .hero {
            height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding-top: 70px;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #050505 100%);
        }

        .hero h1 {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 800;
            margin-bottom: 1rem;
            line-height: 1.1;
        }

        .hero p {
            color: var(--text-dim);
            max-width: 600px;
            margin-bottom: 2rem;
            font-size: 1.2rem;
        }

        .hero-btn {
            background: white;
            color: black;
            padding: 15px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .hero-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(255,255,255,0.1);
        }

        /* Product Grid */
        .nova-container {
            padding: 100px 5%;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px;
        }

        .card {
            background: var(--surface);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid var(--border);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: rgba(255,255,255,0.2);
        }

        .visual-placeholder {
            width: 100%;
            height: 280px;
            background: linear-gradient(135deg, #1e1e1e 0%, #111 100%);
            border-radius: 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Generative product shapes using CSS */
        .shape {
            width: 120px;
            height: 120px;
            filter: blur(20px);
            opacity: 0.6;
            animation: pulse 4s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); opacity: 0.4; }
            to { transform: scale(1.2); opacity: 0.7; }
        }

        .card h3 {
            font-size: 1.4rem;
            margin-bottom: 8px;
        }

        .card .description {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 15px;
            height: 40px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card .price {
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: block;
        }

        .add-to-bag {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .add-to-bag:hover {
            background: #007aff;
            transform: scale(0.98);
        }

        /* Cart Drawer */
        .cart-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }

        .cart-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .cart-drawer {
            position: fixed;
            top: 0;
            right: -100%;
            width: 400px;
            height: 100%;
            background: var(--bg);
            border-left: 1px solid var(--border);
            z-index: 2001;
            padding: 40px;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }

        .cart-drawer.active {
            right: 0;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .close-cart {
            cursor: pointer;
            font-size: 1.5rem;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            align-items: center;
        }

        .cart-item-img {
            width: 70px;
            height: 70px;
            background: var(--surface);
            border-radius: 10px;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-info h4 { font-size: 0.9rem; }
        .cart-item-info p { color: var(--text-dim); font-size: 0.8rem; }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 5px;
        }

        .qty-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            cursor: pointer;
        }

        .cart-footer {
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .checkout-btn {
            width: 100%;
            background: white;
            color: black;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        /* Responsive */
        @media (max-width: 500px) {
            .cart-drawer { width: 100%; }
            #search-input { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">NovaCart</div>
        <div class="nav-actions">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search tech...">
            </div>
            <div class="cart-trigger" onclick="toggleCart()">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6zM3 6h18M16 10a4 4 0 01-8 0"/></svg>
                <span class="cart-count">0</span>
            </div>
        </div>
    </header>

    <section class="hero">
        <h1>Future. Handheld.</h1>
        <p>Experience the next evolution of smart accessories on this premium NovaCart environment. Designed for the minimalists of 2026.</p>
        <a href="#store" class="hero-btn">Explore NovaCart Shop</a>
    </section>

    <div class="nova-container" id="store">
        <div class="grid" id="product-grid">
            <!-- Rendered by JS -->
        </div>
    </div>

    <div class="cart-overlay" onclick="toggleCart()"></div>
    <aside class="cart-drawer">
        <div class="cart-header">
            <h2>Your Bag</h2>
            <div class="close-cart" onclick="toggleCart()">&times;</div>
        </div>
        <div class="cart-items" id="cart-items-container">
            <!-- Cart items here -->
        </div>
        <div class="cart-footer">
            <div class="total-row">
                <span>Subtotal</span>
                <span id="cart-subtotal">$0.00</span>
            </div>
            <button class="checkout-btn">Checkout from NovaCart</button>
        </div>
    </aside>

    <script>
        // Data
        const products = [
            {
                id: 1,
                name: "Aura Watch Ultra",
                description: "Aerospace-grade titanium with a 3000-nit display. The ultimate companion for your NovaCart journey.",
                price: 799,
                color: "#0071e3"
            },
            {
                id: 2,
                name: "Sonic Pods Pro",
                description: "Next-gen spatial audio with active noise canceling that adapts to your environment in real-time.",
                price: 249,
                color: "#ff3b30"
            },
            {
                id: 3,
                name: "Nova Beam 4K",
                description: "A pocket-sized projector that turns any wall into a 120-inch cinema. Native 4K wireless streaming.",
                price: 599,
                color: "#34c759"
            },
            {
                id: 4,
                name: "Grip Pad MagSafe",
                description: "Super-slim wireless charger that stays cool and charges 3x faster than standard pads.",
                price: 89,
                color: "#af52de"
            },
            {
                id: 5,
                name: "Zenith Glass Case",
                description: "A protective layer so thin you'll forget it's there. Sapphire crystal back for scratch resistance.",
                price: 49,
                color: "#ffcc00"
            },
            {
                id: 6,
                name: "Flow Mouse Zero",
                description: "Ergonomic precision with a weightless feel. Frictionless glide for modern NovaCart workflows.",
                price: 129,
                color: "#5856d6"
            }
        ];

        let cart = JSON.parse(localStorage.getItem('novacart_storage')) || [];

        // Elements
        const grid = document.getElementById('product-grid');
        const cartItemsContainer = document.getElementById('cart-items-container');
        const cartCount = document.querySelector('.cart-count');
        const cartSubtotal = document.getElementById('cart-subtotal');
        const searchInput = document.getElementById('search-input');

        // Functions
        function renderProducts(filter = '') {
            grid.innerHTML = '';
            const filtered = products.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));
            
            filtered.forEach(p => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="visual-placeholder">
                        <div class="shape" style="background: ${p.color}"></div>
                    </div>
                    <h3>${p.name}</h3>
                    <p class="description">${p.description}</p>
                    <span class="price">$${p.price}</span>
                    <button class="add-to-bag" onclick="addToCart(${p.id})">Add to Bag</button>
                `;
                grid.appendChild(card);
            });
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const exists = cart.find(item => item.id === id);

            if (exists) {
                exists.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }

            saveCart();
            updateCartUI();
            openCart();
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            saveCart();
            updateCartUI();
        }

        function updateQuantity(id, amt) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.quantity += amt;
                if (item.quantity <= 0) {
                    removeFromCart(id);
                } else {
                    saveCart();
                    updateCartUI();
                }
            }
        }

        function saveCart() {
            localStorage.setItem('novacart_storage', JSON.stringify(cart));
        }

        function updateCartUI() {
            // Count
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            cartCount.textContent = totalItems;

            // List
            cartItemsContainer.innerHTML = '';
            let subtotal = 0;

            cart.forEach(item => {
                subtotal += item.price * item.quantity;
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `
                    <div class="cart-item-img" style="background: linear-gradient(45deg, ${item.color}, #000)"></div>
                    <div class="cart-item-info">
                        <h4>${item.name}</h4>
                        <p>$${item.price}</p>
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="updateQuantity(${item.id}, -1)">-</button>
                            <span>${item.quantity}</span>
                            <button class="qty-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                        </div>
                    </div>
                    <div style="cursor:pointer; opacity:0.5" onclick="removeFromCart(${item.id})">&times;</div>
                `;
                cartItemsContainer.appendChild(div);
            });

            cartSubtotal.textContent = `$${subtotal.toLocaleString()}`;
        }

        function toggleCart() {
            document.querySelector('.cart-overlay').classList.toggle('active');
            document.querySelector('.cart-drawer').classList.toggle('active');
        }

        function openCart() {
            document.querySelector('.cart-overlay').classList.add('active');
            document.querySelector('.cart-drawer').classList.add('active');
        }

        // Event Listeners
        searchInput.addEventListener('input', (e) => {
            renderProducts(e.target.value);
        });

        // Initialize NovaCart
        console.log("NovaCart Initializing...");
        renderProducts();
        updateCartUI();
    </script>
</body>
</html>
