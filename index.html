<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaCart | Premium Smart Gadgets</title>
    <style>
        :root {
            --bg: #ffffff;
            --surface: #f8f9fa;
            --text: #111111;
            --text-muted: #666666;
            --accent: #007AFF;
            --border: #e5e5e5;
            --glass: rgba(255, 255, 255, 0.8);
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        [data-theme="dark"] {
            --bg: #0a0a0a;
            --surface: #151515;
            --text: #ffffff;
            --text-muted: #a0a0a0;
            --accent: #0a84ff;
            --border: #222222;
            --glass: rgba(10, 10, 10, 0.8);
            --shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            transition: background-color 0.3s ease;
            overflow-x: hidden;
        }

        /* --- Header --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            cursor: pointer;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .search-container {
            position: relative;
        }

        #search-input {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 20px;
            width: 200px;
            transition: var(--transition);
        }

        #search-input:focus {
            width: 300px;
            outline: none;
            border-color: var(--accent);
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
            position: relative;
            padding: 5px;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--accent);
            color: white;
            font-size: 10px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* --- Hero --- */
        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 10%;
            background: radial-gradient(circle at top right, var(--surface), var(--bg));
        }

        .hero h1 {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 800;
            line-height: 1;
            margin-bottom: 20px;
            letter-spacing: -2px;
        }

        .hero p {
            color: var(--text-muted);
            font-size: 1.2rem;
            max-width: 600px;
            margin-bottom: 40px;
        }

        /* --- Products --- */
        .container {
            padding: 80px 5%;
        }

        .section-title {
            font-size: 2rem;
            margin-bottom: 40px;
            font-weight: 700;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow);
            border-color: var(--accent);
        }

        .product-visual {
            width: 100%;
            aspect-ratio: 1/1;
            background: linear-gradient(135deg, #e0e0e0, #f0f0f0);
            border-radius: 16px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        [data-theme="dark"] .product-visual {
            background: linear-gradient(135deg, #222, #333);
        }

        .product-visual::after {
            content: '';
            width: 60%;
            height: 60%;
            background: var(--accent);
            opacity: 0.1;
            border-radius: 50%;
            filter: blur(40px);
        }

        .product-category {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .product-name {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .product-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-price {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .add-btn {
            background: var(--text);
            color: var(--bg);
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .add-btn:hover {
            background: var(--accent);
            color: white;
        }

        /* --- Cart Drawer --- */
        .cart-overlay {
            position: fixed;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: var(--transition);
        }

        .cart-drawer {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100%;
            background: var(--bg);
            z-index: 2001;
            transition: var(--transition);
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        .cart-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .cart-overlay.active .cart-drawer {
            right: 0;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .cart-items {
            flex-grow: 1;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 25px;
            border-bottom: 1px solid var(--border);
        }

        .cart-item-info {
            flex-grow: 1;
        }

        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .qty-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
        }

        .cart-footer {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid var(--border);
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .checkout-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
        }

        /* --- Footer --- */
        footer {
            padding: 60px 5%;
            border-top: 1px solid var(--border);
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .cart-drawer {
                width: 100%;
            }
            #search-input {
                display: none;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">NovaCart</div>
        <div class="nav-actions">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search gadgets...">
            </div>
            <button class="icon-btn" id="theme-toggle" aria-label="Toggle Theme">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            </button>
            <button class="icon-btn" id="cart-trigger">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4H6z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                <span class="cart-badge" id="cart-count">0</span>
            </button>
        </div>
    </header>

    <main>
        <section class="hero">
            <h1>The Future of<br>Smart Living.</h1>
            <p>Experience the next generation of premium tech accessories designed for the modern professional within the NovaCart ecosystem.</p>
        </section>

        <section class="container">
            <h2 class="section-title">Latest Innovations</h2>
            <div class="product-grid" id="product-grid">
                <!-- Products injected by JS -->
            </div>
        </section>
    </main>

    <div class="cart-overlay" id="cart-overlay">
        <div class="cart-drawer">
            <div class="cart-header">
                <h2>Your Bag</h2>
                <button class="icon-btn" id="cart-close">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="cart-items" id="cart-items-container">
                <!-- Cart items injected by JS -->
            </div>
            <div class="cart-footer">
                <div class="total-row">
                    <span>Total</span>
                    <span id="cart-total">$0.00</span>
                </div>
                <button class="checkout-btn">Checkout Now</button>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 NovaCart Industries. Minimalist Tech Excellence.</p>
    </footer>

    <script>
        // Product Data
        const products = [
            {
                id: 1,
                name: "Neural Link Pro",
                category: "Audio",
                price: 299,
                desc: "Active noise cancellation with neural-tuned spatial audio for deep immersion."
            },
            {
                id: 2,
                name: "Flux Watch S3",
                category: "Wearable",
                price: 450,
                desc: "Holographic display interface with 14-day quantum battery life."
            },
            {
                id: 3,
                name: "Core Hub X",
                category: "Workspace",
                price: 129,
                desc: "Thunderbolt 5 integration in a recycled aerospace-grade aluminum chassis."
            },
            {
                id: 4,
                name: "Prism Display",
                category: "Monitors",
                price: 899,
                desc: "32-inch 8K OLED panel with glassmorphism-inspired bezel-less design."
            },
            {
                id: 5,
                name: "Nova Pad",
                category: "Power",
                price: 79,
                desc: "Invisible induction charging that works through any surface up to 30mm."
            },
            {
                id: 6,
                name: "Aero Mouse",
                category: "Peripherals",
                price: 110,
                desc: "Vertical ergonomic flow design with zero-latency optical switches."
            }
        ];

        // State Management
        let cart = JSON.parse(localStorage.getItem('novacart-bag')) || [];
        let currentTheme = localStorage.getItem('novacart-theme') || 'light';

        // Initialize NovaCart
        function init() {
            document.documentElement.setAttribute('data-theme', currentTheme);
            renderProducts(products);
            updateCartUI();
        }

        // Render Product Cards
        function renderProducts(items) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = items.map(product => `
                <div class="product-card">
                    <div class="product-visual">
                        <div style="width:100px; height:100px; border: 4px solid var(--accent); border-radius: 20px; transform: rotate(15deg);"></div>
                    </div>
                    <div class="product-category">${product.category}</div>
                    <h3 class="product-name">${product.name}</h3>
                    <p class="product-desc">${product.desc}</p>
                    <div class="product-footer">
                        <span class="product-price">$${product.price}</span>
                        <button class="add-btn" onclick="addToBag(${product.id})">Add to Bag</button>
                    </div>
                </div>
            `).join('');
        }

        // Search Functionality
        document.getElementById('search-input').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = products.filter(p => 
                p.name.toLowerCase().includes(query) || 
                p.category.toLowerCase().includes(query)
            );
            renderProducts(filtered);
        });

        // Cart Functions
        window.addToBag = (id) => {
            const product = products.find(p => p.id === id);
            const existing = cart.find(item => item.id === id);

            if (existing) {
                existing.qty++;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            
            saveAndUpdate();
            toggleCart(true);
        };

        function removeFromBag(id) {
            cart = cart.filter(item => item.id !== id);
            saveAndUpdate();
        }

        function updateQty(id, delta) {
            const item = cart.find(item => item.id === id);
            if (item) {
                item.qty += delta;
                if (item.qty < 1) return removeFromBag(id);
                saveAndUpdate();
            }
        }

        function saveAndUpdate() {
            localStorage.setItem('novacart-bag', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            const count = cart.reduce((acc, item) => acc + item.qty, 0);
            const total = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);
            
            document.getElementById('cart-count').innerText = count;
            document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
            
            const container = document.getElementById('cart-items-container');
            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:var(--text-muted); margin-top:50px;">Your bag is empty.</p>';
                return;
            }

            container.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div class="product-visual" style="width:60px; height:60px; margin:0;"></div>
                    <div class="cart-item-info">
                        <div style="font-weight:600">${item.name}</div>
                        <div style="color:var(--text-muted); font-size:0.8rem">$${item.price} each</div>
                        <div class="cart-item-controls">
                            <button class="qty-btn" onclick="updateQty(${item.id}, -1)">-</button>
                            <span>${item.qty}</span>
                            <button class="qty-btn" onclick="updateQty(${item.id}, 1)">+</button>
                        </div>
                    </div>
                    <button class="icon-btn" onclick="removeFromBag(${item.id})">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18m-2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    </button>
                </div>
            `).join('');
        }

        // UI Interactions
        const cartOverlay = document.getElementById('cart-overlay');
        const cartTrigger = document.getElementById('cart-trigger');
        const cartClose = document.getElementById('cart-close');

        function toggleCart(show) {
            if (show) cartOverlay.classList.add('active');
            else cartOverlay.classList.remove('active');
        }

        cartTrigger.addEventListener('click', () => toggleCart(true));
        cartClose.addEventListener('click', () => toggleCart(false));
        cartOverlay.addEventListener('click', (e) => {
            if (e.target === cartOverlay) toggleCart(false);
        });

        // Theme Toggle
        document.getElementById('theme-toggle').addEventListener('click', () => {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', currentTheme);
            localStorage.setItem('novacart-theme', currentTheme);
        });

        // Final Load
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
