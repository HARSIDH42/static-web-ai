<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaCart | Premium Tech & Lifestyle</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --accent: #0071e3;
            --glass: rgba(255, 255, 255, 0.7);
            --card-bg: #f5f5f7;
            --border: #e5e5e5;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg: #000000;
            --text: #ffffff;
            --accent: #2997ff;
            --glass: rgba(0, 0, 0, 0.7);
            --card-bg: #1c1c1e;
            --border: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            transition: var(--transition);
            overflow-x: hidden;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        /* Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            backdrop-filter: blur(20px);
            background: var(--glass);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            cursor: pointer;
        }

        .nav-actions {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .search-container {
            position: relative;
        }

        .search-container input {
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            width: 200px;
            outline: none;
            transition: var(--transition);
        }

        .search-container input:focus {
            width: 300px;
            border-color: var(--accent);
        }

        .btn-icon {
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.2rem;
            cursor: pointer;
            position: relative;
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -10px;
            background: var(--accent);
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 50%;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 10%;
            background: linear-gradient(180deg, var(--bg) 0%, var(--card-bg) 100%);
        }

        .hero h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 20px;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s forwards;
        }

        .hero p {
            font-size: 1.5rem;
            color: #86868b;
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeInUp 1s 0.3s forwards;
        }

        /* Products Grid */
        .section-title {
            padding: 100px 5% 40px;
            font-size: 2.5rem;
            text-align: center;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            padding: 0 5% 100px;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            transition: var(--transition);
            border: 1px solid transparent;
            cursor: pointer;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .product-img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 20px;
        }

        .product-info h3 {
            font-size: 1.4rem;
            margin-bottom: 10px;
        }

        .product-desc {
            font-size: 0.9rem;
            color: #86868b;
            margin-bottom: 15px;
            height: 40px;
            overflow: hidden;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .price {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .add-btn {
            background: var(--text);
            color: var(--bg);
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .add-btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        /* Cart Drawer */
        .cart-drawer {
            position: fixed;
            right: -400px;
            top: 0;
            width: 400px;
            height: 100%;
            background: var(--bg);
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
            z-index: 2000;
            transition: var(--transition);
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        .cart-drawer.active {
            right: 0;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .cart-items {
            flex-grow: 1;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .cart-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
        }

        .cart-item-info {
            flex-grow: 1;
        }

        .cart-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .qty-btn {
            background: var(--card-bg);
            border: none;
            color: var(--text);
            width: 25px;
            height: 25px;
            border-radius: 5px;
            cursor: pointer;
        }

        .cart-footer {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .checkout-btn {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 20px;
            cursor: pointer;
        }

        /* Chatbot */
        .chatbot-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            z-index: 999;
            font-size: 1.5rem;
        }

        .chat-window {
            position: fixed;
            bottom: 100px;
            right: 30px;
            width: 350px;
            height: 450px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            display: none;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            z-index: 999;
            overflow: hidden;
        }

        .chat-header {
            padding: 15px;
            background: var(--accent);
            color: white;
            font-weight: 600;
        }

        .chat-messages {
            flex-grow: 1;
            padding: 15px;
            overflow-y: auto;
            font-size: 0.9rem;
        }

        .chat-input {
            padding: 15px;
            border-top: 1px solid var(--border);
            display: flex;
        }

        .chat-input input {
            flex-grow: 1;
            border: none;
            outline: none;
            background: none;
            color: var(--text);
        }

        /* Animations */
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 1500;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .cart-drawer { width: 100%; right: -100%; }
            .search-container input { width: 120px; }
            .search-container input:focus { width: 180px; }
        }
    </style>
</head>
<body data-theme="light">

    <div class="overlay" id="overlay"></div>

    <header>
        <div class="logo" onclick="window.scrollTo(0,0)">NovaCart</div>
        <div class="nav-actions">
            <div class="search-container">
                <input type="text" placeholder="Search tech..." id="searchInput">
            </div>
            <button class="btn-icon" id="themeToggle">🌓</button>
            <button class="btn-icon" id="cartToggle">
                🛒 <span class="cart-count" id="cartCount">0</span>
            </button>
        </div>
    </header>

    <section class="hero">
        <h1>NovaCart Series X</h1>
        <p>The future of premium technology is here.</p>
        <button class="add-btn" style="padding: 15px 40px;" onclick="document.getElementById('explore').scrollIntoView()">Explore Collection</button>
    </section>

    <h2 class="section-title" id="explore">The NovaCart Collection</h2>
    <div class="product-grid" id="productGrid">
        <!-- Products injected by JS -->
    </div>

    <!-- Cart Drawer -->
    <div class="cart-drawer" id="cartDrawer">
        <div class="cart-header">
            <h2>Your Bag</h2>
            <button class="btn-icon" id="closeCart">✕</button>
        </div>
        <div class="cart-items" id="cartItems">
            <!-- Cart items injected by JS -->
        </div>
        <div class="cart-footer">
            <div style="display: flex; justify-content: space-between; font-weight: 700; font-size: 1.2rem;">
                <span>Total</span>
                <span id="cartTotal">₹0</span>
            </div>
            <button class="checkout-btn">Checkout on NovaCart</button>
        </div>
    </div>

    <!-- Chatbot -->
    <div class="chatbot-btn" id="chatBtn">💬</div>
    <div class="chat-window" id="chatWindow">
        <div class="chat-header">NovaCart Assistant</div>
        <div class="chat-messages" id="chatMsgs">
            <div>Hello! I'm your NovaCart guide. What are you looking for today? (Try: "watch", "jacket", "shoes")</div>
        </div>
        <div class="chat-input">
            <input type="text" placeholder="Ask NovaCart..." id="chatInput">
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "NovaCart Chrono Ultra", price: 45000, img: "images/watch-1.jpg", desc: "Titanium casing with sapphire glass. The ultimate smart companion." },
            { id: 2, name: "NovaCart Stealth Jacket", price: 12000, img: "images/jacket-1.jpg", desc: "Climate-controlled fabric for any environment." },
            { id: 3, name: "NovaCart Pulse Kicks", price: 8500, img: "images/shoe-1.jpg", desc: "Self-lacing smart tech with impact absorption." },
            { id: 4, name: "NovaCart Essence 01", price: 6500, img: "images/perfume.jpg", desc: "Tech-distilled molecular fragrance for the modern era." },
            { id: 5, name: "NovaCart Vision Band", price: 32000, img: "images/watch-2.jpg", desc: "OLED wraparound display for seamless data flow." },
            { id: 6, name: "NovaCart Storm Shell", price: 15000, img: "images/jacket-2.jpg", desc: "Aero-grade waterproof materials." },
            { id: 7, name: "NovaCart Orbit Ring", price: 18000, img: "images/jewellery-1.jpg", desc: "Smart health tracking hidden in gold." },
            { id: 8, name: "NovaCart Velocity S1", price: 9200, img: "images/shoe-2.jpg", desc: "Next-gen propulsion for urban explorers." },
            { id: 9, name: "NovaCart Luxe Chrono", price: 55000, img: "images/watch-3.jpg", desc: "Elegance meets advanced bio-sensors." },
            { id: 10, name: "NovaCart Hybrid Shirt", price: 4500, img: "images/shirt-1.jpg", desc: "Wrinkle-free tech-silk for the CEO in you." },
            { id: 11, name: "NovaCart Titan Belt", price: 3500, img: "images/belt.jpg", desc: "Magnetic lock system with micro-adjustments." },
            { id: 12, name: "NovaCart Nero Jacket", price: 21000, img: "images/jacket-3.jpg", desc: "Infrared heating panels integrated inside." }
        ];

        let cart = JSON.parse(localStorage.getItem('novacart-cart')) || [];

        // DOM Elements
        const productGrid = document.getElementById('productGrid');
        const cartCount = document.getElementById('cartCount');
        const cartDrawer = document.getElementById('cartDrawer');
        const overlay = document.getElementById('overlay');
        const cartItemsContainer = document.getElementById('cartItems');
        const cartTotal = document.getElementById('cartTotal');
        const themeToggle = document.getElementById('themeToggle');
        const searchInput = document.getElementById('searchInput');
        const chatBtn = document.getElementById('chatBtn');
        const chatWindow = document.getElementById('chatWindow');
        const chatInput = document.getElementById('chatInput');
        const chatMsgs = document.getElementById('chatMsgs');

        // Initialize NovaCart
        function init() {
            renderProducts(products);
            updateCartUI();
        }

        // Render Products
        function renderProducts(items) {
            productGrid.innerHTML = items.map(p => `
                <div class="product-card">
                    <img src="${p.img}" alt="${p.name}" class="product-img">
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <p class="product-desc">${p.desc}</p>
                        <div class="product-footer">
                            <span class="price">₹${p.price.toLocaleString('en-IN')}</span>
                            <button class="add-btn" onclick="addToCart(${p.id})">Add to Bag</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Search functionality
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = products.filter(p => 
                p.name.toLowerCase().includes(term) || 
                p.desc.toLowerCase().includes(term)
            );
            renderProducts(filtered);
        });

        // Cart functions
        window.addToCart = (id) => {
            const item = products.find(p => p.id === id);
            const inCart = cart.find(c => c.id === id);
            if(inCart) {
                inCart.qty++;
            } else {
                cart.push({...item, qty: 1});
            }
            saveCart();
            updateCartUI();
            openCart();
        };

        function updateCartUI() {
            cartCount.innerText = cart.reduce((acc, item) => acc + item.qty, 0);
            cartItemsContainer.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <img src="${item.img}" alt="${item.name}">
                    <div class="cart-item-info">
                        <h4>${item.name}</h4>
                        <p>₹${item.price.toLocaleString('en-IN')}</p>
                        <div class="cart-controls">
                            <button class="qty-btn" onclick="changeQty(${item.id}, -1)">-</button>
                            <span>${item.qty}</span>
                            <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
                        </div>
                    </div>
                    <button class="btn-icon" onclick="removeFromCart(${item.id})">✕</button>
                </div>
            `).join('');
            
            const total = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);
            cartTotal.innerText = `₹${total.toLocaleString('en-IN')}`;
        }

        window.changeQty = (id, delta) => {
            const item = cart.find(c => c.id === id);
            if(item) {
                item.qty += delta;
                if(item.qty <= 0) removeFromCart(id);
                else {
                    saveCart();
                    updateCartUI();
                }
            }
        };

        window.removeFromCart = (id) => {
            cart = cart.filter(c => c.id !== id);
            saveCart();
            updateCartUI();
        };

        function saveCart() {
            localStorage.setItem('novacart-cart', JSON.stringify(cart));
        }

        // UI Toggles
        const openCart = () => { cartDrawer.classList.add('active'); overlay.style.display = 'block'; };
        const closeCart = () => { cartDrawer.classList.remove('active'); overlay.style.display = 'none'; };

        document.getElementById('cartToggle').onclick = openCart;
        document.getElementById('closeCart').onclick = closeCart;
        overlay.onclick = closeCart;

        // Theme Toggle
        themeToggle.onclick = () => {
            const body = document.body;
            const current = body.getAttribute('data-theme');
            const next = current === 'light' ? 'dark' : 'light';
            body.setAttribute('data-theme', next);
        };

        // Chatbot Logic
        chatBtn.onclick = () => {
            chatWindow.style.display = chatWindow.style.display === 'flex' ? 'none' : 'flex';
        };

        chatInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                const msg = chatInput.value;
                const userDiv = document.createElement('div');
                userDiv.style.textAlign = 'right';
                userDiv.style.margin = '10px 0';
                userDiv.innerHTML = `<span style="background:var(--card-bg); padding:8px; border-radius:10px;">${msg}</span>`;
                chatMsgs.appendChild(userDiv);
                
                // Bot response logic
                setTimeout(() => {
                    const botDiv = document.createElement('div');
                    botDiv.style.margin = '10px 0';
                    let reply = "NovaCart recommends checking our new Chrono series.";
                    
                    if(msg.toLowerCase().includes('watch')) reply = "The NovaCart Chrono Ultra is our bestseller. It's featured at the top!";
                    if(msg.toLowerCase().includes('jacket')) reply = "Our Stealth and Storm jackets offer superior climate protection.";
                    if(msg.toLowerCase().includes('shoe')) reply = "The Pulse Kicks are perfect for comfort and tech enthusiasts.";
                    
                    botDiv.innerHTML = `<span style="background:var(--accent); color:white; padding:8px; border-radius:10px;">${reply}</span>`;
                    chatMsgs.appendChild(botDiv);
                    chatMsgs.scrollTop = chatMsgs.scrollHeight;
                }, 600);

                chatInput.value = '';
            }
        });

        // Initialize on load
        init();

    </script>
</body>
</html>
