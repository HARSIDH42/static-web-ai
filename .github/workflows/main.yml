name: Gemini AI Full Website Generator + Deploy

on:
  push:
    branches:
      - main

jobs:
  ai-generate-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Gemini SDK
        run: pip install --upgrade google-genai

      - name: Generate Full Website using Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python << 'EOF'
          import os
          import subprocess
          from pathlib import Path
          from google import genai

          repo = Path(".")
          images = Path("images")

          # Collect image list
          image_list = []
          if images.exists():
              for img in images.glob("*"):
                  if img.suffix.lower() in [".jpg",".jpeg",".png",".webp"]:
                      image_list.append(img.name)

          image_list_text = "\n".join(image_list)

          prompt = f"""
          ROLE
          You are a senior frontend engineer building a premium 2026 modern e-commerce storefront.

          BRAND NAME
          NovaCart

          WEBSITE IDEA
          A premium Smart Gadgets Store selling modern tech accessories.

          AVAILABLE IMAGES
          {image_list_text}

          IMAGE RULES
          - Use ONLY these images
          - Image path must be: images/FILENAME
          - Do not invent filenames

          REQUIRED FILES
          index.html
          products.html
          product.html
          cart.html
          checkout.html
          styles.css
          app.js

          FUNCTIONALITY
          - Add to cart (localStorage)
          - Live cart counter
          - Cart drawer
          - Product search
          - Product filtering
          - Quantity control
          - Remove from cart
          - Fully responsive
          - SPA feel without reload

          DESIGN
          - Glassmorphism navbar
          - Premium hero
          - Responsive product grid
          - Minimalist luxury design
          - Smooth animations
          - Clean typography

          JAVASCRIPT
          - Vanilla JS only
          - All functionality in app.js

          OUTPUT FORMAT
          Return files exactly like this:

          FILE: index.html
          <html code>

          FILE: products.html
          <html code>

          FILE: product.html
          <html code>

          FILE: cart.html
          <html code>

          FILE: checkout.html
          <html code>

          FILE: styles.css
          <css code>

          FILE: app.js
          <javascript code>
          """

          client = genai.Client(api_key=os.environ["GEMINI_API_KEY"])

          response = client.models.generate_content(
              model="gemini-2.0-flash",
              contents=prompt
          )

          text = response.text

          if not text:
              print("Gemini returned empty output")
              exit(1)

          text = text.replace("```","")

          current_file = None
          content = []

          for line in text.splitlines():

              if line.startswith("FILE:"):
                  if current_file:
                      Path(current_file).write_text("\n".join(content),encoding="utf-8")

                  current_file = line.replace("FILE:","").strip()
                  content = []
              else:
                  content.append(line)

          if current_file:
              Path(current_file).write_text("\n".join(content),encoding="utf-8")

          subprocess.run(["git","config","--global","user.name","gemini-bot"])
          subprocess.run(["git","config","--global","user.email","bot@example.com"])

          subprocess.run(["git","add","."])

          result = subprocess.run(["git","diff","--cached","--quiet"])

          if result.returncode != 0:
              subprocess.run(["git","commit","-m","Gemini AI generated full NovaCart storefront"])
              subprocess.run(["git","push"])
          else:
              print("No changes detected")
          EOF

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Deploy Website to S3
        run: |
          aws s3 sync . s3://staticwebzsitegit \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --delete
