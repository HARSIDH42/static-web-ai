name: Gemini AI Auto Commit and Deploy

on:
  push:
    branches:
      - main

jobs:
  ai-commit-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Gemini SDK
        run: pip install --upgrade google-genai

      - name: Generate Website with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python << 'EOF'
          import os
          import subprocess
          from pathlib import Path
          from google import genai

          # Collect available images
          image_dir = Path("images")
          image_list = []

          if image_dir.exists():
              for img in image_dir.iterdir():
                  if img.suffix.lower() in [".png", ".jpg", ".jpeg", ".webp"]:
                      image_list.append(img.name)

          image_list_text = "\n".join(image_list) if image_list else "No images available"

          prompt = f"""
          ROLE
          You are a senior frontend engineer building a premium 2026 modern e-commerce storefront.

          GOAL
          Create a LONG, visually rich, scroll-heavy premium website like Apple / Tesla / Nothing.
          
          BRAND NAME
          NovaCart

          WEBSITE IDEA
          A premium Smart Gadgets Store selling modern tech accessories.

          AVAILABLE IMAGES
          {image_list_text}
          
          IMAGE RULES
          - Use ONLY these images
          - Path: images/FILENAME
          - Do NOT invent images

          IMPORTANT RULES
          - Replace every instance of "page" with "NovaCart"

          FUNCTIONALITY
          - Add to Bag (localStorage)
          - Live cart counter
          - Animated cart drawer
          - Quantity increment & removal
          - Live search filtering
          - No page reload
          - Vanilla JavaScript only
          - All JS inside <script>
          - Give description to the products
          - functionality common for all e-commerce websites
          - add darkmode switch
          - add a chatbot for choosing the right product

          DESIGN
          - Light mode and Dark mode
          - Large hero section
          - Glassmorphism sticky header
          - Responsive CSS grid
          - Modern typography
          - Premium minimalist layout
          
          OUTPUT
          Return ONLY a complete working index.html file.
          """

          client = genai.Client(api_key=os.environ["GEMINI_API_KEY"])

          response = client.models.generate_content(
              model="gemini-3-flash-preview",
              contents=prompt
          )

          html = response.text

          if not html:
              print("Gemini returned empty response")
              exit(1)

          # Clean markdown if present
          html = html.replace("```html", "").replace("```", "").strip()

          # Write index.html
          Path("index.html").write_text(html, encoding="utf-8")

          # Git config
          subprocess.run(["git","config","--global","user.name","gemini-bot"])
          subprocess.run(["git","config","--global","user.email","bot@example.com"])

          subprocess.run(["git","add","index.html"])

          result = subprocess.run(["git","diff","--cached","--quiet"])

          if result.returncode != 0:
              subprocess.run(["git","commit","-m","Gemini AI generated NovaCart UI"])
              subprocess.run(["git","push"])
          else:
              print("No changes detected")
          EOF

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Deploy to S3
        run: |
          aws s3 sync . s3://staticwebzsitegit \
            --exclude "*" \
            --include "index.html" \
            --include "images/*" \
            --delete
