name: Gemini AI Auto Commit and Deploy

on:
  push:
    branches:
      - main

jobs:
  ai-commit-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install --upgrade google-genai requests

      - name: Generate Images and Website with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python << 'EOF'

          import os
          import subprocess
          import requests
          from pathlib import Path
          from google import genai

          # -----------------------------
          # CREATE IMAGE DIRECTORY
          # -----------------------------

          img_dir = Path("assets/images/products")
          img_dir.mkdir(parents=True, exist_ok=True)

          products = [
              "futuristic wireless earbuds",
              "smart fitness watch",
              "premium mechanical keyboard",
              "minimalist wireless mouse",
              "AI smart home speaker",
              "RGB gaming headset",
              "portable bluetooth speaker",
              "smartphone gimbal stabilizer"
          ]

          image_names = []

          print("Generating AI images...")

          for i, product in enumerate(products,1):

              filename = f"product{i}.png"
              path = img_dir / filename

              url = f"https://image.pollinations.ai/prompt/{product}?width=800&height=800"

              img = requests.get(url).content
              path.write_bytes(img)

              image_names.append(filename)

          print("Images generated")

          # -----------------------------
          # PREPARE IMAGE LIST FOR PROMPT
          # -----------------------------

          image_list = "\n".join(image_names)

          # -----------------------------
          # GEMINI PROMPT
          # -----------------------------

          prompt = f"""
          ROLE
          You are a senior frontend engineer building a premium 2026 modern e-commerce storefront.

          BRAND NAME
          NovaCart

          WEBSITE IDEA
          A premium Smart Gadgets Store selling modern tech accessories.

          IMPORTANT RULES
          - All images must come from assets/images/products/
          - Use only these images:
          {image_list}
          - Image paths must be relative

          FUNCTIONALITY
          - Add to Bag (localStorage)
          - Live cart counter
          - Animated cart drawer
          - Quantity increment & removal
          - Live search filtering
          - No page reload
          - Vanilla JavaScript only
          - All JS inside <script>

          DESIGN
          - Large hero section
          - Glassmorphism sticky header
          - Responsive CSS grid
          - Premium minimalist UI
          - Product cards
          - Smooth hover animations

          OUTPUT
          Return ONLY a complete working index.html file.
          """

          print("Generating HTML with Gemini...")

          client = genai.Client(api_key=os.environ["GEMINI_API_KEY"])

          response = client.models.generate_content(
              model="gemini-2.0-flash",
              contents=prompt
          )

          html = response.text

          if not html:
              print("Gemini returned empty response")
              exit(1)

          html = html.replace("```html","").replace("```","").strip()

          Path("index.html").write_text(html,encoding="utf-8")

          print("index.html generated")

          # -----------------------------
          # GIT CONFIG
          # -----------------------------

          subprocess.run(["git","config","--global","user.name","gemini-bot"])
          subprocess.run(["git","config","--global","user.email","bot@example.com"])

          subprocess.run(["git","add","."])

          result = subprocess.run(["git","diff","--cached","--quiet"])

          if result.returncode != 0:
              subprocess.run(["git","commit","-m","AI generated NovaCart website with images"])
              subprocess.run(["git","push"])
          else:
              print("No changes detected")

          EOF

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Deploy to S3
        run: |
          aws s3 sync . s3://staticwebzsitegit \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --delete
